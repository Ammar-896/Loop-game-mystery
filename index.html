    kc_print:{label:'Find the fingerprint',cost:'~1 min',run(G){
      G.clue('fingerprint2','Fingerprint on Vial','A partial fingerprint on one vial — too small for Fritz, wrong pattern for Cole. Size and pattern consistent with a woman\'s right hand.','clue');G.learn('print_found');
      return{narr:'<p>A partial print on a vial. Too small for Fritz. Wrong ridge pattern for Cole. Consistent with a <b>woman\'s right hand</b>.',acts:['kc_fritz','_leave']};
    }},
    up_irina:{label:'Confront Irina Petrov',cost:'~2 min',run(G){
      const tr=G.trust('irina');G.addTrust('irina');
      let sp='',tag='neutral',rem=G.loop>1&&tr>0;
      if(G.knows('falcon_op')&&tr>=1){tag='suspicious';sp=`She looks at you for a very long time. "You're smarter than they said." A small, cold smile. "I was never defecting. I was sent to retrieve the documents and eliminate the source. You call it murder. We call it tidying."`;G.learn('irina_confession');G.clue('irina_conf',"Irina's Confession",'Irina admits she was a KGB agent sent to retrieve documents and kill Volkov. She was never defecting.','suspect');}
      else if(tr>=1)sp=`"I am as much a victim of this as Volkov. I barely knew him." She's very controlled.`;
      else sp=`"I am in shock. Please leave me."`;
      return{npc:{name:'Irina Petrov',tag,sp,rem},acts:['up_search','up_passport','_leave']};
    }},
    up_search:{label:"Search Irina's belongings",cost:'~2 min',run(G){
      G.clue('irina_bag',"Irina's Hidden Equipment",'Inside a false bottom in her bag: a miniature radio, a glass syringe case, and a KGB identity document in a different name.','suspect');G.learn('irina_equipment');
      return{narr:'<p>False bottom in the bag. Inside: a <b>miniature radio</b>, a glass syringe case, and a <b>KGB identity document</b> in a different name. She was never a defector.',acts:['up_irina','up_passport','_leave']};
    }},
    up_passport:{label:"Examine Irina's passport",cost:'~1 min',run(G){
      G.clue('passport',"Irina's Passport",'The passport has been used to enter Austria four times in two years — always coinciding with KGB operations listed in CIA intelligence files.','clue');G.learn('passport_found');
      return{narr:'<p>Four entries to Austria in two years — every entry dates coincide with <b>KGB operations listed in CIA files</b>. This is not her first job.',acts:['up_irina','_leave']};
    }},
  },
  confidence(k){
    let s=0;
    if(k.has('transmission_found'))s+=15;if(k.has('falcon_op'))s+=20;if(k.has('origin_found'))s+=20;
    if(k.has('irina_confession'))s+=25;if(k.has('irina_equipment'))s+=15;if(k.has('vials_found'))s+=15;
    return Math.min(s,100);
  },
  endingTier(k){
    if(k.has('irina_confession')&&k.has('irina_equipment')&&k.has('origin_found')&&k.has('falcon_op'))return'perfect';
    if(k.has('irina_equipment')&&k.has('origin_found')&&k.has('falcon_op'))return'full';
    if(k.has('transmission_found')&&k.has('irina_equipment'))return'strong';
    if(k.has('transmission_found')||k.has('irina_equipment'))return'circumstantial';
    return'gut';
  },
  endings:{
    perfect:{sub:'★ OPERATION EXPOSED',title:'The spy unmasked.',color:'var(--accent2)',body:`<p>Irina was arrested before the 0400 exfil. The decoded transmission, her KGB documents, the vials with her fingerprints, and her own confession formed an unprecedented intelligence case.</p><p>The briefcase was recovered from a Vienna dead-drop. Irina was traded in a prisoner exchange two years later — a fact that was never made public.</p><p>Volkov's schematics were used to advance Western nuclear monitoring programs. He never knew his work survived him.</p><p style="color:var(--accent2);font-style:italic">In the cold war, there are no perfect endings. Only outcomes that favor one side slightly more than the other.</p>`},
    full:{sub:'CASE CLOSED',title:'Spy captured.',color:'var(--accent)',body:`<p>Irina was detained before exfil. The documents were partially recovered. She was tried in absentia — the CIA preferred a quiet prisoner exchange to a public trial.</p><p>The FALCON operation was classified. Cole received a commendation. Fritz received nothing.</p>`},
    strong:{sub:'DETAINED',title:'Operation disrupted.',color:'var(--accent)',body:`<p>Irina was stopped, documents recovered. But without her full confession, the extent of the operation remained unclear. She was exchanged quietly within six months.</p>`},
    circumstantial:{sub:'TOO SLOW',title:'She reached the exfil.',color:'var(--accent3)',body:`<p>By the time your accusation was processed, it was 4:15am. Irina was gone. The briefcase went with her. Cole was reprimanded.</p><p style="color:var(--danger)">Moscow had what it needed. The FALCON operation was a complete success — for them.</p>`},
    gut:{sub:'WRONG CALL',title:'A diplomatic incident.',color:'var(--danger)',body:`<p>Accusing Irina without evidence nearly caused an international incident. She filed a formal protest. The CIA disavowed the situation. Volkov's death was ruled a medical event.</p><p style="color:var(--danger)">The schematics were in Moscow by morning.</p>`},
  }
},

// ─── STORY 7: THE BURNING SEASON ──────────────────────────────
{
  id:'burning', title:'The Burning Season', setting:'Brazilian Amazon, Present Day',
  desc:'An environmental journalist is found dead at a logging camp. Her exposé would have ended careers. The fire that killed her was no accident.',
  tags:['ENVIRONMENT','COVER-UP','JOURNALISM'], difficulty:'med',
  victim:'Camila Reyes', crime:'arson/murder',
  intro:`<p>Camila Reyes — investigative journalist — was found dead in her cabin at the Santarém logging camp. The fire was deliberately set. Her laptop and evidence drive are missing.</p><p>Her story would have brought down a billion-dollar logging operation. Someone made sure it never ran. You have ten minutes.</p>`,
  suspects:{
    dario:{name:'Dario',full:'Dario Melo',init:'DM',role:'Camp foreman',guilty:true},
    sen:{name:'Senator',full:'Sen. Augusto Lima',init:'AL',role:'Visiting senator',guilty:false},
    flora:{name:'Flora',full:'Flora Braga',init:'FB',role:'Camp cook',guilty:false},
    tiago:{name:'Tiago',full:'Tiago Fontes',init:'TF',role:'Environmental monitor',guilty:false},
  },
  locations:{
    cabin:{name:'Burnt Cabin',sub:'Camila\'s Cabin',desc:'Charred remains. The fire burned from the outside in — investigators missed this.',
      actions:['cb_origin','cb_laptop','cb_door']},
    office:{name:'Camp Office',sub:'Main Building',desc:"Dario's domain. He's been in here since the fire was reported.",
      actions:['of_dario','of_contract','of_phone']},
    senRoom:{name:"Senator's Suite",sub:'VIP Quarters',desc:'Senator Lima sits with his aide. His composure is flawless — too flawless.',
      actions:['sn_senator','sn_briefcase','sn_aide']},
    workerCamp:{name:'Worker Camp',sub:'East Section',desc:'Flora and Tiago are here. Workers who will talk, if they trust you.',
      actions:['wc_flora','wc_tiago','wc_notebook']},
  },
  actions:{
    cb_origin:{label:'Determine fire origin point',cost:'~1 min',run(G){
      G.clue('fire_origin','Fire Origin','Burn patterns show the fire started at the exterior cabin wall — not inside. Accelerant was used. The door was also externally barred.','clue');G.learn('fire_outside');
      return{narr:'<p>Burn patterns: fire started at the <b>exterior wall</b>. Accelerant was used. And the door was <b>barred from outside</b>. Camila was trapped. This was not an accident.',acts:['cb_laptop','cb_door','_leave']};
    }},
    cb_laptop:{label:'Search for the laptop',cost:'~1 min',run(G){
      G.clue('no_laptop','Missing Laptop','The laptop\'s hinges are in the ash — but no hard drive. The drive was removed before the fire. Someone took the evidence first, then set the fire.','suspect');G.learn('laptop_gone');
      return{narr:'<p>Laptop hinges in the ash. But <b>no hard drive</b>. It was removed before the fire. The evidence was taken first — then she was killed.',acts:['cb_origin','cb_door','_leave']};
    }},
    cb_door:{label:'Examine the door bar',cost:'~30 sec',run(G){
      G.clue('door_bar','External Bar Marks','Steel bar marks on the door frame — exterior. The bar came from the maintenance shed. Only foremen have key access.','suspect');G.learn('bar_found');
      return{narr:'<p>External bar marks on the door frame. The bar came from the <b>maintenance shed</b> — key access required. Only senior staff have that key.',acts:['cb_origin','cb_laptop','_leave']};
    }},
    of_dario:{label:'Speak with Dario Melo',cost:'~2 min',run(G){
      const tr=G.trust('dario');G.addTrust('dario');
      let sp='',tag='neutral',rem=G.loop>1&&tr>0;
      if(tr>=2&&G.knows('laptop_gone')){tag='suspicious';sp=`"She had names. Specific names." He stares at the table. "Senator Lima. Our parent company. Illegal clearing going back twelve years. She was going to publish in two days." A pause. "The senator came to me personally. Said 'handle it.' I thought he meant her story. Not—" He stops.`;G.learn('dario_ordered');G.clue('dario_reveals','Dario\'s Account',"Senator Lima told Dario to 'handle' Camila. Dario claims he misunderstood the instruction.",'suspect');}
      else if(tr>=1)sp=`"A tragedy. We don't know what caused the fire yet." He says it like a script.`;
      else sp=`"I run a safe camp. I don't know anything about this journalist's death."`;
      return{npc:{name:'Dario Melo',tag,sp,rem},acts:['of_contract','of_phone','_leave']};
    }},
    of_contract:{label:'Find the contract',cost:'~2 min',run(G){
      G.clue('contract','Illegal Clearing Contract','A contract for 40,000 hectares of illegal clearing — signed by Senator Lima\'s aide and backdated. Exactly what Camila\'s exposé was about.','suspect');G.learn('contract_found');
      return{narr:'<p>A contract for <b>40,000 hectares</b> of illegal clearing — signed by Lima\'s aide, <b>backdated</b>. This is what Camila had. This is what killed her.',acts:['of_dario','of_phone','_leave']};
    }},
    of_phone:{label:"Check Dario's call log",cost:'~1 min',run(G){
      G.clue('call_log',"Dario's Call Log",'Dario called Senator Lima\'s private line at 11:14pm — the same night as the fire, two hours before it started.','suspect');G.learn('dario_called');
      return{narr:'<p>Dario called Senator Lima\'s private number at <b>11:14pm</b> — the same night, two hours before the fire started. A coincidence would be remarkable.',acts:['of_dario','of_contract','_leave']};
    }},
    sn_senator:{label:'Approach Senator Lima',cost:'~2 min',run(G){
      const tr=G.trust('sen');G.addTrust('sen');
      let sp='',tag='neutral',rem=G.loop>1&&tr>0;
      if(tr>=2&&G.knows('contract_found')){tag='suspicious';sp=`"You have the contract." He's quiet for a moment. "Camila was going to destroy a project that employs ten thousand people. There are bigger pictures than one journalist's story." He meets your eyes. "I told Dario to manage the situation. What he chose to do with that instruction is his responsibility."`;G.learn('senator_admits');}
      else sp=`"A terrible incident. I'm cooperating fully with the investigation."`;
      return{npc:{name:'Sen. Augusto Lima',tag,sp,rem},acts:['sn_briefcase','sn_aide','_leave']};
    }},
    sn_briefcase:{label:"Search the senator's briefcase",cost:'~1 min',run(G){
      G.clue('sen_docs','Senator\'s Documents','Draft press statement already written: "...tragic accident at logging facility..." — prepared before any investigation had concluded. The senator expected this outcome.','suspect');G.learn('sen_prepared');
      return{narr:'<p>A <b>draft press statement</b> already written: <i>"...tragic accident at logging facility..."</i> — written <b>before any investigation</b>. He knew this was coming.',acts:['sn_senator','sn_aide','_leave']};
    }},
    sn_aide:{label:"Pressure the senator's aide",cost:'~2 min',run(G){
      G.clue('aide_slip',"Aide's Slip",'The aide accidentally confirms the senator received a call from Dario confirming "the matter was resolved" — before the fire was reported to camp staff.','clue');G.learn('aide_confirmed');
      return{narr:'<p>The aide tries to stay vague — then slips: <b>"...the senator received a call that the matter was resolved..."</b> before the fire was reported. Lima knew before anyone else.',acts:['sn_senator','_leave']};
    }},
    wc_flora:{label:'Speak with Flora Braga',cost:'~2 min',run(G){
      const tr=G.trust('flora');G.addTrust('flora');
      let sp='',tag='neutral',rem=G.loop>1&&tr>0;
      if(tr>=2){tag='friendly';sp=`"I gave Camila food that night. She showed me something on her phone — a recording of Dario on the phone, saying 'she needs to not be here anymore.' I was too scared to tell anyone." Her voice shakes. "I'm still scared."`;G.learn('flora_witness');G.clue('dario_recording','Dario\'s Recorded Call','Flora saw a recording on Camila\'s phone: Dario saying "she needs to not be here anymore."','suspect');}
      else sp=`"I cook. I keep my head down. In this camp, that's how you survive."`;
      return{npc:{name:'Flora Braga',tag,sp,rem},acts:['wc_tiago','wc_notebook','_leave']};
    }},
    wc_tiago:{label:'Speak with Tiago Fontes',cost:'~2 min',run(G){
      const tr=G.trust('tiago');G.addTrust('tiago');
      let sp='',tag='neutral',rem=G.loop>1&&tr>0;
      if(tr>=2){tag='friendly';sp=`"I saw Dario at Camila's cabin at 1am. Walking away fast. He was carrying something — a metal bar, I think. I didn't understand then." He looks at the ground. "I understand now."`;G.learn('tiago_witness');G.clue('tiago_saw',"Tiago's Eyewitness",'Tiago saw Dario leaving Camila\'s cabin at 1am carrying a metal bar — hours before the fire.','clue');}
      else sp=`"I monitor the tree line. I don't get involved in camp politics."`;
      return{npc:{name:'Tiago Fontes',tag,sp,rem},acts:['wc_flora','wc_notebook','_leave']};
    }},
    wc_notebook:{label:"Find Camila's backup notebook",cost:'~1 min',run(G){
      G.clue('notebook','Camila\'s Notebook','Hidden under a floorboard in the worker canteen — Camila\'s handwritten backup notes. Names, dates, GPS coordinates for illegal sites. The full story, in her handwriting.','clue');G.learn('notebook_found');
      return{narr:'<p>Under a floorboard — Camila\'s handwritten backup. Names, dates, GPS coordinates. <b>The full story</b>. She hid it here knowing someone might come for her.',acts:['wc_flora','wc_tiago','_leave']};
    }},
  },
  confidence(k){
    let s=0;
    if(k.has('fire_outside'))s+=15;if(k.has('bar_found'))s+=15;if(k.has('dario_called'))s+=15;
    if(k.has('tiago_witness'))s+=20;if(k.has('dario_reveals'))s+=20;if(k.has('notebook_found'))s+=15;
    return Math.min(s,100);
  },
  endingTier(k){
    if(k.has('dario_reveals')&&k.has('tiago_witness')&&k.has('notebook_found')&&k.has('aide_confirmed'))return'perfect';
    if(k.has('tiago_witness')&&k.has('dario_called')&&k.has('bar_found'))return'full';
    if(k.has('dario_called')&&k.has('fire_outside'))return'strong';
    if(k.has('fire_outside')||k.has('bar_found'))return'circumstantial';
    return'gut';
  },
  endings:{
    perfect:{sub:'★ STORY PUBLISHED',title:"The story ran.",color:'var(--accent2)',body:`<p>Dario confessed under pressure of physical evidence and Tiago's testimony. Camila's backup notebook provided everything her laptop had held. The story was published posthumously — by her editor, from her notes.</p><p>Senator Lima was arrested three months later for conspiracy. Forty thousand hectares of illegal clearing was halted. The logging operation was investigated by federal authorities.</p><p>Flora and Tiago were relocated under witness protection. The camp was closed.</p><p style="color:var(--accent2);font-style:italic">Camila wrote the story. You made sure it was read.</p>`},
    full:{sub:'CASE CLOSED',title:'Dario convicted.',color:'var(--accent)',body:`<p>Dario received twenty-five years. The senator was never charged — insufficient direct evidence of ordering the murder. He did not seek re-election.</p><p>The logging operation was suspended pending investigation. Camila's story was published from her recovered notes.</p>`},
    strong:{sub:'CONVICTED',title:'Partial justice.',color:'var(--accent)',body:`<p>Dario was convicted on physical evidence. The senator connection was investigated but unproven. He served two terms to loud public opposition.</p><p>The illegal clearing was reduced but not stopped.</p>`},
    circumstantial:{sub:'ACQUITTED',title:'Insufficient evidence.',color:'var(--accent3)',body:`<p>Dario walked. The fire was ruled accidental. The senator held a press conference calling for "better safety standards in remote facilities."</p><p style="color:var(--danger)">The clearing continued. The story never ran. Camila's notebook was never found.</p>`},
    gut:{sub:'NO CASE',title:'Buried.',color:'var(--danger)',body:`<p>Your accusation was laughed out. The senator's lawyers threatened defamation. The fire was ruled accidental. Dario was promoted.</p><p style="color:var(--danger)">Forty thousand hectares of rainforest were cleared the following year.</p>`},
  }
},

// ─── STORY 8: ALL THE WRONG NOTES ─────────────────────────────
{
  id:'notes', title:'All the Wrong Notes', setting:'Jazz Club, New Orleans, 1954',
  desc:'A jazz legend is found dead in his dressing room between sets. The music stopped. Someone in the building made sure it never started again.',

    bertie:{name:'Bertie',full:'Bertie Cloak',init:'BC',role:'Club owner',guilty:false},

  locations:{

    dr_mirror:{label:'Examine the vanity mirror',cost:'~30 sec',run(G){

    dr_letters:{label:"Find the letters in Lucky's jacket",cost:'~1 min',run(G){
      G.clue('love_letters','Love Letters','Three letters in Lucky\'s jacket — from a woman named "D." Passionate, recent. He was having an affair. And Mavis\'s name appears in one: "Does she know yet?"','suspect');G.learn('affair_found');
      return{narr:'<p>Three letters signed by <b>"D."</b> Passionate. Recent. Lucky was having an affair. And in the last one: <b>"Does Mavis know yet?"</b>',acts:['dr_glass','dr_mirror','_leave']};
    }},
    sg_band:{label:'Speak with the band',cost:'~2 min',run(G){
      G.clue('band_talk','Band Gossip','The drummer: "Mavis came backstage before the second set. Told us Lucky wouldn\'t be finishing the night. Five minutes before anyone found him."','suspect');G.learn('mavis_early');
      return{narr:'<p>Drummer, quietly: <b>"Mavis came back here before the second set. Said Lucky wouldn\'t be finishing the night. Five minutes before anyone found him."</b> She knew before anyone else.',acts:['sg_sonny','sg_setlist','_leave']};
    }},
    sg_sonny:{label:'Speak with Sonny Ray',cost:'~2 min',run(G){
      const tr=G.trust('sonny');G.addTrust('sonny');
      let sp='',tag='neutral',rem=G.loop>1&&tr>0;
      if(tr>=2){tag='friendly';sp=`"Mavis asked me to cover if Lucky didn't make the second set. Said he might be 'under the weather.' I thought she was covering for him drinking again." He shakes his head. "She asked me an hour before he was found."`;G.learn('sonny_told');G.clue('mavis_plan',"Mavis Planned Ahead",'Mavis asked Sonny to cover for Lucky an hour before the body was found. She knew exactly what was going to happen.','suspect');}
      else sp=`"Lucky was a legend. Nobody touched him in this town."`;
      return{npc:{name:'Sonny Ray',tag,sp,rem},acts:['sg_band','sg_setlist','_leave']};

    sg_setlist:{label:'Check the night\'s setlist',cost:'~30 sec',run(G){
      G.clue('setlist','Modified Setlist','The setlist for Set 2 was already changed to Sonny\'s key before Lucky was found. Someone changed it during the break — before the body was discovered.','clue');G.learn('setlist_changed');
      return{narr:'<p>Set 2 was already changed to <b>Sonny\'s key</b> before Lucky was found. Someone changed this during the break — knowing Lucky wouldn\'t be returning.',acts:['sg_band','sg_sonny','_leave']};
    }},
    of_bertie:{label:'Speak with Bertie Cloak',cost:'~2 min',run(G){
      const tr=G.trust('bertie');G.addTrust('bertie');
      let sp='',tag='neutral',rem=G.loop>1&&tr>0;
      if(tr>=2){tag='friendly';sp=`"Look, Mavis came to me three weeks ago. Said Lucky was planning to leave her — and that he'd changed his will. She asked if he'd said anything to me." He fidgets. "She seemed real calm about it. That calm scared me more than if she'd cried."`;G.learn('will_info');G.clue('mavis_will','Mavis and the Will','Mavis learned Lucky had changed his will three weeks ago. She approached Bertie about it, asking questions. She was calm.','suspect');}
      else sp=`"Lucky was my best earner. Why would I want him dead?"`;
      return{npc:{name:'Bertie Cloak',tag,sp,rem},acts:['of_contract','of_cash','_leave']};

    of_contract:{label:"Review Lucky's contract",cost:'~1 min',run(G){
      G.clue('contract2',"Lucky's Contract",'Lucky had signed a new contract three weeks ago — with a competitor club. He was leaving Bertie\'s. The old contract had a death clause reverting all recordings to Bertie.','loop');
      return{narr:'<p>Lucky had signed with a <b>competitor club</b> three weeks ago. The old contract had a <b>death clause</b> — all recordings revert to Bertie. Motive for Bertie, but no evidence he acted on it.',acts:['of_bertie','of_cash','_leave']};
    }},
    of_cash:{label:'Find the cash payment',cost:'~1 min',run(G){
      G.clue('cash_envelope','Unexplained Cash','A sealed envelope in the safe: $800 cash, note reads "for your trouble — M." Bertie was paid by someone with an M name. Mavis?','suspect');G.learn('bertie_paid');
      return{narr:'<p>Sealed envelope in the safe: <b>$800 cash</b>, note: <b>"for your trouble — M."</b> Bertie was paid by someone. M. <b>Mavis.</b>',acts:['of_bertie','_leave']};
    }},
    al_bottle:{label:'Find the discarded bottle',cost:'~1 min',run(G){
      G.clue('strychnine_bottle','Strychnine Bottle','A small brown bottle labeled "rat poison" in the alley bin. Residue matches the glass. Discarded during the break between sets.','suspect');G.learn('bottle_found');
      return{narr:'<p>A small brown bottle in the alley bin: <b>rat poison</b>, residue matching the glass. Discarded during the break. Someone walked out here and threw this away after Lucky drank.',acts:['al_glove2','al_witness','_leave']};
    }},
    al_glove2:{label:'Find the gloves',cost:'~30 sec',run(G){
      G.clue('coral_gloves','Coral Gloves','Ladies\' gloves, coral color — matching Mavis\'s outfit tonight. Discarded alongside the bottle. Coral lipstick trace on the thumb.','suspect');G.learn('gloves2_found');
      return{narr:'<p>Ladies\' gloves, <b>coral</b> — matching Mavis\'s outfit. Discarded with the bottle. <b>Coral lipstick on the thumb</b>. She poured the glass wearing these.',acts:['al_bottle','al_witness','_leave']};

      return{narr:'<p>A stage hand, smoking: <b>"Mavis was out here at 9:47. Said she needed air. She had something in her hand — dropped it in the bin."</b>',acts:['al_bottle','al_glove2','_leave']};

  endings:{

{

  suspects:{

  actions:{
    po_scene:{label:'Examine the scene carefully',cost:'~1 min',run(G){

    po_computer:{label:"Access Priya's computer",cost:'~1 min',run(G){

      return{narr:'<p>Email sent at <b>11:17pm</b>: <b>"VELA AI — DATA FABRICATION — URGENT"</b> to the SEC whistleblower desk. Received and logged. She made it — but someone found out.',acts:['po_scene','po_note','_leave']};

    sv_logs:{label:'Access server access logs',cost:'~2 min',run(G){
      G.clue('server_log','Server Access Log','Marco\'s credentials accessed Priya\'s shared drive at 11:43pm — 26 minutes after she sent the SEC email. A mass deletion followed.','suspect');G.learn('marco_accessed');

    }},
    sv_deletion:{label:'Examine the deleted files',cost:'~1 min',run(G){
      G.clue('deleted_files','Deleted Evidence','4.7GB of data deleted — Priya\'s compiled evidence against Vela AI. Deleted remotely using Marco\'s admin credentials. The metadata survives.','suspect');G.learn('deletion_found');
      return{narr:'<p><b>4.7GB deleted</b> — Priya\'s evidence. Deleted remotely under Marco\'s admin credentials at 11:44pm. The files are gone. The <b>metadata survives</b>.',acts:['sv_logs','sv_backup','_leave']};
    }},
    sv_backup:{label:'Find the hidden backup',cost:'~2 min',run(G){
      G.clue('hidden_backup','Priya\'s Hidden Backup','Priya created a secondary backup on an air-gapped drive — hidden in a server rack. It contains the original evidence: fabricated training data, falsified performance metrics, investor fraud.','clue');G.learn('backup_found');
      return{narr:'<p>An air-gapped drive hidden in rack B-7. Priya\'s backup. Inside: <b>fabricated training data, falsified performance metrics, full investor fraud documentation</b>. She prepared for this.',acts:['sv_logs','sv_deletion','_leave']};
    }},
    co_marco:{label:'Confront Marco Stein',cost:'~2 min',run(G){
      const tr=G.trust('marco');G.addTrust('marco');
      let sp='',tag='neutral',rem=G.loop>1&&tr>0;
      if(G.knows('backup_found')&&tr>=1){tag='suspicious';sp=`"The backup." He lets out a slow breath. "She was going to burn everything we built. Seven years. A billion in valuation." He stands slowly. "I went to her office to talk her out of it. She wouldn't listen." His voice goes flat. "I made a decision."`;G.learn('marco_confession');G.clue('marco_conf',"Marco's Admission","Marco 'made a decision' after Priya refused to withdraw the SEC complaint. He went to her office.",'suspect');}
      else if(tr>=1)sp=`"Priya was under enormous pressure. This is a tragedy." His lawyer keeps touching his arm.`;

    co_search:{label:"Search Marco's office",cost:'~2 min',run(G){
      G.clue('ev_drive','Evidence Drive Found','The evidence drive Priya prepared — found in Marco\'s desk drawer, taped underneath. He took it after staging her death.','suspect');G.learn('drive_found');
      return{narr:'<p>Taped under Marco\'s desk drawer: <b>Priya\'s evidence drive</b>. He took it from her after staging the scene.',acts:['co_marco','co_email','_leave']};
    }},
    co_email:{label:"Find Marco's deleted email",cost:'~1 min',run(G){
      G.clue('marco_email','Marco\'s Deleted Email','Recovered deleted email sent at 11:52pm: "It\'s done. Delete your copy. Don\'t contact me." Recipient: unknown encrypted address.','suspect');G.learn('email_found');
      return{narr:'<p>Deleted email, 11:52pm: <b>"It\'s done. Delete your copy. Don\'t contact me."</b> Sent to an encrypted address. He told someone immediately after.',acts:['co_marco','_leave']};

    br_yung:{label:'Speak with Yung Cho',cost:'~2 min',run(G){
      const tr=G.trust('yung');G.addTrust('yung');
      let sp='',tag='neutral',rem=G.loop>1&&tr>0;
      if(tr>=2){tag='friendly';sp=`"Priya came to me two weeks ago. Showed me the data. I told her to be careful — that Marco would see her as a threat, not a partner." He exhales. "She said she knew the risk."`;G.learn('yung_context');G.clue('priya_warned','Priya Was Warned','Yung warned Priya that Marco would see her as a threat. She said she knew the risk.','loop');}
      else sp=`"I need a lawyer before I say anything."`;
      return{npc:{name:'Yung Cho',tag,sp,rem},acts:['br_petra','br_diallo','_leave']};
    }},
    br_petra:{label:'Speak with Petra Solis',cost:'~2 min',run(G){
      const tr=G.trust('petra');G.addTrust('petra');
      let sp='',tag='neutral',rem=G.loop>1&&tr>0;
      if(tr>=2){tag='neutral';sp=`"I told Marco about the SEC filing at 11:30pm. He called me, frantic. I told him legally there was nothing we could do." She's very still. "He hung up. I assumed he meant legal action." Her hands tighten. "I didn't think he meant—"`;G.learn('petra_told');G.clue('petra_informed','Petra Told Marco','Petra told Marco about the SEC filing at 11:30pm. He hung up. 13 minutes later he accessed Priya\'s drive.','clue');}
      else sp=`"I handle legal matters for Vela. I have nothing more to say."`;
      return{npc:{name:'Petra Solis',tag,sp,rem},acts:['br_yung','br_diallo','_leave']};

    br_diallo:{label:'Speak with Diallo Kane',cost:'~2 min',run(G){
      const tr=G.trust('diallo');G.addTrust('diallo');
      let sp='',tag='neutral',rem=G.loop>1&&tr>0;
      if(tr>=2){tag='friendly';sp=`"I was in the building until midnight. I saw Marco leave the elevator from the fourth floor at 12:02am — not the top floor where his office is. The fourth floor is Priya's floor." He looks at his hands. "I've been sitting here trying to decide whether to say that."`;G.learn('diallo_witness');G.clue('diallo_saw',"Diallo's Testimony",'Diallo saw Marco exiting the fourth floor elevator at 12:02am. Priya\'s floor. Marco claims he was in his office all evening.','clue');}
      else sp=`"I just work here."`;
      return{npc:{name:'Diallo Kane',tag,sp,rem},acts:['br_yung','br_petra','_leave']};
    }},
  },
  confidence(k){
    let s=0;
    if(k.has('staged_found'))s+=15;if(k.has('marco_accessed'))s+=20;if(k.has('drive_found'))s+=20;
    if(k.has('marco_confession'))s+=20;if(k.has('diallo_witness'))s+=15;if(k.has('backup_found'))s+=10;

  endingTier(k){

  endings:{
    perfect:{sub:'★ FRAUD EXPOSED',title:'The SEC gets everything.',color:'var(--accent2)',body:`<p>Marco was arrested before leaving the building. Priya's hidden backup, the evidence drive from his desk, Diallo's eyewitness testimony, and his own admission formed a complete case.</p><p>The SEC fraud investigation used Priya's data. Three Vela AI board members were charged. Investors recovered partial losses through a class action.</p><p>Marco received thirty years for murder and securities fraud. Vela AI was dissolved.</p><p>Priya's SEC filing was officially accepted. She is credited as a whistleblower.</p><p style="color:var(--accent2);font-style:italic">She filed the report. You made sure it mattered.</p>`},
    full:{sub:'CASE CLOSED',title:'Convicted.',color:'var(--accent)',body:`<p>Marco was convicted of murder and securities fraud. The company collapsed during the trial. Investors lost hundreds of millions. Three board members resigned.</p><p>Priya's backup data was used in the SEC case. Her filing was posthumously accepted.</p>`},
    strong:{sub:'ARRESTED',title:'Partial justice.',color:'var(--accent)',body:`<p>Marco was arrested on murder charges. The securities fraud was harder to prove without the full backup. He received twenty years. The fraud case was settled civilly.</p>`},
    circumstantial:{sub:'NOT ENOUGH',title:'He walked.',color:'var(--accent3)',body:`<p>Marco's lawyers argued the digital evidence was circumstantial. He was acquitted of murder. Vela AI filed for IPO three months later.</p><p style="color:var(--danger)">Priya's SEC filing triggered a paper audit. Vela paid a $2 million fine and continued operating.</p>`},

{

    ct_agnes:{label:'Speak with Agnes MacPhail',cost:'~2 min',run(G){

      if(tr>=2){tag='friendly';sp=`"I heard them arguing at the lighthouse — Connell and Ewan — around ten. I nearly went up. I wish now I had." He pauses. "Connell has always had an appetite for things beyond his station. The sea, money, power." He looks at his hands. "He asked me once how much the Meridian Star's cargo was worth. I thought it was idle talk."`;G.learn('reverend_context');G.clue('connell_asked','Connell\'s Interest','Connell asked the Reverend about the Meridian Star\'s cargo value. He was researching the salvage.','suspect');}

  endings:{
    perfect:{sub:'★ FULL JUSTICE',title:'Both crimes solved.',color:'var(--accent2)',body:`<p>Connell Brodie was arrested as he attempted to begin salvage operations at dawn. The pre-filled salvage claim, the rope with his initials, Ewan's logbook, and Agnes's testimony about the German gold formed an overwhelming case.</p><p>The Meridian Star was recovered by Crown salvage crews. The gold was returned to its originating institution.</p><p>Connell received twenty years for murder and maritime sabotage. Agnes retained the cottage and a modest pension from Trinity House, who acknowledged Ewan's service.</p><p>The lighthouse was re-lit the following night. It has burned every night since.</p><p style="color:var(--accent2);font-style:italic">The light came back on. Ewan would have wanted that most.</p>`},
    full:{sub:'CASE CLOSED',title:'Arrested at dawn.',color:'var(--accent)',body:`<p>Connell was stopped before he could begin salvage. The logbook and salvage papers were decisive evidence. He received fifteen years. The gold was recovered by Crown salvage.</p>`},
    strong:{sub:'CONVICTED',title:'Murder proven.',color:'var(--accent)',body:`<p>The logbook and light sabotage were enough for a murder conviction. The salvage plan was not admitted as evidence. Connell received ten years. The gold was never officially recovered.</p>`},
    circumstantial:{sub:'ACQUITTED',title:'Insufficient.',color:'var(--accent3)',body:`<p>Connell's lawyer argued the logbook was speculative and the light failure could have been mechanical. He was acquitted. He left the island the following week.</p><p style="color:var(--danger)">Three months later, a salvage crew working for an anonymous client recovered the Meridian Star's cargo.</p>`},
    gut:{sub:'NO CASE',title:'Died for nothing.',color:'var(--danger)',body:`<p>Your accusation without evidence was dismissed. Ewan's death was ruled accidental. Connell filed a salvage claim the following morning and was awarded first rights.</p><p style="color:var(--danger)">He became a wealthy man. He never returned to keeping lights.</p>`},
  }
},

]; // end STORIES

// ═══════════════════════════════════════════════════════════════
// GAME ENGINE
// ═══════════════════════════════════════════════════════════════
const G = {
  story: null,
  loop: 1,
  time: 600,
  timerInterval: null,
  actionsThisLoop: 0,
  maxActions: 6,
  knowledge: new Set(),
  suspectTrust: {},
  suspectSuspicion: {},
  currentLocation: null,
  gameOver: false,
  accusationAttempts: 0,
  loopHistory: [],
  currentLoopActions: [],

  // ── BOOT ────────────────────────────────────────────────────
  init() {
    this.buildMenu();
  },

  buildMenu() {
    const grid = document.getElementById('stories-grid');
    grid.innerHTML = '';
    STORIES.forEach((s, i) => {
      const card = document.createElement('div');
      card.className = 'story-card';
      const dClass = s.difficulty === 'easy' ? 'diff-easy' : s.difficulty === 'hard' ? 'diff-hard' : 'diff-med';
      const dLabel = s.difficulty === 'easy' ? 'EASY' : s.difficulty === 'hard' ? 'HARD' : 'MEDIUM';
      card.innerHTML = `
        <div class="card-num">CASE ${String(i+1).padStart(2,'0')}</div>
        <div class="card-difficulty ${dClass}">${dLabel}</div>
        <div class="card-title">${s.title}</div>
        <div class="card-setting">${s.setting}</div>
        <div class="card-desc">${s.desc}</div>
        <div class="card-tags">${s.tags.map(t=>`<span class="card-tag">${t}</span>`).join('')}</div>
        <div class="card-play">PLAY →</div>
      `;
      card.onclick = () => this.startStory(s);
      grid.appendChild(card);
    });
  },

  startStory(story) {
    this.story = story;
    this.loop = 1;
    this.time = 600;
    this.actionsThisLoop = 0;
    this.knowledge = new Set();
    this.suspectTrust = {};
    this.suspectSuspicion = {};
    this.currentLocation = null;
    this.gameOver = false;
    this.accusationAttempts = 0;
    this.loopHistory = [];
    this.currentLoopActions = [];
    // init trust/susp
    for (const id of Object.keys(story.suspects)) {
      this.suspectTrust[id] = 0;
      this.suspectSuspicion[id] = 0;
    }
    // init locations
    for (const loc of Object.values(story.locations)) {
      if (loc.unlocked === undefined) loc.unlocked = true;
    }
    document.getElementById('story-title-bar').textContent = story.title.toUpperCase();
    document.getElementById('b-case').textContent = story.title;
    document.getElementById('notes-list').innerHTML = '<div class="notes-empty" id="notes-empty">No evidence yet.<br>Information persists<br>across loops.</div>';
    // show game screen
    document.getElementById('screen-menu').classList.add('hidden');
    document.getElementById('screen-game').classList.add('active');
    this.renderLocations();
    this.renderSuspects();
    this.updateTimerUI();
    this.updateAccuseBtn();
    this.startTimer();
    this.showModal(story.title, story.setting,
      [{label:'BEGIN LOOP 1', cb:()=>this.goHome()}],
      story.intro);
  },

  backToMenu() {
    clearInterval(this.timerInterval);
    this.gameOver = true;
    document.getElementById('screen-game').classList.remove('active');
    document.getElementById('screen-menu').classList.remove('hidden');
    this.closeModal();
  },

  // ── KNOWLEDGE / CLUES ───────────────────────────────────────
  learn(key) { this.knowledge.add(key); },
  knows(key) { return this.knowledge.has(key); },
  trust(id) { return this.suspectTrust[id] || 0; },
  addTrust(id) { this.suspectTrust[id] = Math.min((this.suspectTrust[id]||0)+1, 4); },
  addSusp(id, n) {
    this.suspectSuspicion[id] = Math.min((this.suspectSuspicion[id]||0)+n, 10);
    this.renderSuspects();
    this.updateConfidence();
  },

  clue(id, title, text, type) {
    if (this.knows('clue_'+id)) return;
    this.learn('clue_'+id);
    this.renderNote(title, text, type);
  },

  clueHTML(title, text) {
    return `<div class="clue-reveal"><div class="clue-ico">◆</div><div class="clue-txt"><strong>CLUE — ${title.toUpperCase()}</strong>${text}</div></div>`;
  },

  // ── RENDER ──────────────────────────────────────────────────
  renderLocations() {
    const list = document.getElementById('map-list');
    list.innerHTML = '';
    for (const [id, loc] of Object.entries(this.story.locations)) {
      const div = document.createElement('div');
      const isActive = this.currentLocation === id;
      const isLocked = !loc.unlocked;
      const visited = this.currentLoopActions.some(a=>a.startsWith(id.substring(0,4)));
      div.className = 'mloc'+(isActive?' active':'')+(isLocked?' locked':'')+(visited?' visited':'');
      div.innerHTML = `<div class="mln">${loc.name}</div><div class="mlh">${isLocked?'— LOCKED —':loc.desc.substring(0,40)+'...'}</div>`;
      if (!isLocked) div.onclick = () => this.visitLocation(id);
      list.appendChild(div);
    }
  },

  unlockLoc(id) {
    if (this.story.locations[id]) {
      this.story.locations[id].unlocked = true;
      this.renderLocations();
    }
  },

  renderSuspects() {
    const row = document.getElementById('b-suspects');
    row.innerHTML = '';
    for (const [id, s] of Object.entries(this.story.suspects)) {
      const susp = this.suspectSuspicion[id]||0;
      const trust = this.suspectTrust[id]||0;
      const div = document.createElement('div');
      div.className = 'sp'+(susp>=5?' hi':'')+(trust>=2?' trust':'');
      div.innerHTML = `<div class="sp-circle">${s.init}</div><div class="sp-name">${s.name}</div>`;
      div.title = `${s.full} — ${s.role}`;
      row.appendChild(div);
    }
  },

  renderNote(title, text, type) {
    const list = document.getElementById('notes-list');
    const empty = document.getElementById('notes-empty');
    if (empty) empty.remove();
    const card = document.createElement('div');
    card.className = `note ${type}`;
    card.innerHTML = `<div class="note-lbl">${type.toUpperCase()}</div><div class="note-cnt"><strong>${title}</strong><br>${text}</div>`;
    list.appendChild(card);
  },

  renderScene(data) {
    const body = document.getElementById('scene-body');
    body.innerHTML = '';
    if (data.npc) {
      const block = document.createElement('div');
      block.className = 'npc-block';
      const tagHTML = data.npc.tag ? `<span class="ntag ${data.npc.tag}">${data.npc.tag.toUpperCase()}</span>` : '';
      const remHTML = data.npc.rem ? `<span class="ntag remembers">REMEMBERS YOU</span>` : '';
      block.innerHTML = `<div class="npc-name">${data.npc.name} ${tagHTML}${remHTML}</div><div class="npc-speech${data.npc.rem?' rem':''}">"${data.npc.sp}"</div>`;
      body.appendChild(block);
    }
    if (data.narr) {
      const div = document.createElement('div');
      div.className = 'narr';
      div.innerHTML = data.narr;
      body.appendChild(div);
    }
    const choices = document.getElementById('choices');
    choices.innerHTML = '';
    (data.acts||[]).forEach((actionId, i) => {
      const btn = document.createElement('button');
      btn.className = 'cbtn';
      const key = String.fromCharCode(65+i);
      if (actionId === '_leave') {
        btn.innerHTML = `<span class="ckey">${key}</span>← Leave`;
        btn.onclick = () => this.goHome();
      } else {
        const a = this.story.actions[actionId];
        const label = a ? a.label : actionId;
        const cost = a ? (a.cost||'') : '';
        btn.innerHTML = `<span class="ckey">${key}</span>${label}${cost?`<span class="ccost">${cost}</span>`:''}`;
        btn.onclick = () => this.runAction(actionId);
      }
      choices.appendChild(btn);
    });
  },

  visitLocation(id) {
    if (this.gameOver) return;
    const loc = this.story.locations[id];
    if (!loc || !loc.unlocked) return;
    this.currentLocation = id;
    document.getElementById('scene-loc').textContent = loc.sub.toUpperCase();
    document.getElementById('scene-ttl').textContent = loc.name;
    this.renderLocations();
    const body = document.getElementById('scene-body');
    body.innerHTML = `<div class="narr">${loc.desc}</div>`;
    const choices = document.getElementById('choices');
    choices.innerHTML = '';
    const available = loc.actions.filter(aid => {
      const a = this.story.actions[aid];
      return a && (typeof a.avail !== 'function' || a.avail(this));
    });
    available.push('_leave');
    available.forEach((actionId, i) => {
      const btn = document.createElement('button');
      btn.className = 'cbtn';
      const key = String.fromCharCode(65+i);
      if (actionId === '_leave') {
        btn.innerHTML = `<span class="ckey">${key}</span>← Leave`;
        btn.onclick = () => this.goHome();
      } else {
        const a = this.story.actions[actionId];
        btn.innerHTML = `<span class="ckey">${key}</span>${a.label}${a.cost?`<span class="ccost">${a.cost}</span>`:''}`;
        btn.onclick = () => this.runAction(actionId);
      }
      choices.appendChild(btn);
    });
    document.getElementById('b-actions').textContent = (this.maxActions - this.actionsThisLoop) + ' left';
  },

  goHome() {
    this.currentLocation = null;
    document.getElementById('scene-loc').textContent = this.story.setting.toUpperCase();
    document.getElementById('scene-ttl').textContent = 'Where will you go?';
    const body = document.getElementById('scene-body');
    body.innerHTML = `<div class="narr"><b>${this.story.victim}</b> is dead. You have <em>${this.formatTime(this.time)}</em> before the loop resets.<br><br>Your notes hold what you've learned. Use them.</div>`;
    document.getElementById('choices').innerHTML = '';
    this.renderLocations();
  },

  // ── ACTION RUNNER ───────────────────────────────────────────
  runAction(actionId) {
    if (this.gameOver) return;
    const action = this.story.actions[actionId];
    if (!action) return;
    if (this.actionsThisLoop >= this.maxActions || this.time <= 0) {
      this.showModal('No Time Left', 'LOOP ENDING', [{label:'Accept', cb:()=>this.triggerLoopEnd()}], '<p>You have run out of time. The loop resets — but your notes persist.</p>');
      return;
    }
    this.actionsThisLoop++;
    this.currentLoopActions.push(actionId);
    const costStr = action.cost || '~1 min';
    let deduct = 90;
    if (costStr.includes('30 sec')) deduct = 30;
    else if (costStr.includes('1 min')) deduct = 60;
    else if (costStr.includes('2 min')) deduct = 120;
    this.time = Math.max(0, this.time - deduct);
    this.updateTimerUI();
    document.getElementById('b-actions').textContent = (this.maxActions - this.actionsThisLoop) + ' left';
    const result = action.run(this);
    this.renderScene(result);
    this.updateConfidence();
    if (this.actionsThisLoop >= this.maxActions || this.time <= 0) {
      setTimeout(() => { if (!this.gameOver) this.triggerLoopEnd(); }, 2000);
    }
  },

  // ── TIMER ───────────────────────────────────────────────────
  startTimer() {
    clearInterval(this.timerInterval);
    this.timerInterval = setInterval(() => {
      if (this.gameOver) { clearInterval(this.timerInterval); return; }
      this.time = Math.max(0, this.time - 1);
      this.updateTimerUI();
      if (this.time <= 0) { clearInterval(this.timerInterval); this.triggerLoopEnd(); }
    }, 1000);
  },

  updateTimerUI() {
    const bar = document.getElementById('timer-bar');
    const txt = document.getElementById('timer-txt');
    const pct = (this.time / 600) * 100;
    bar.style.width = pct + '%';
    txt.textContent = this.formatTime(this.time);
    const crit = this.time <= 60;
    bar.className = crit ? 'crit' : '';
    txt.className = crit ? 'crit' : '';
  },

  formatTime(s) {
    const m = Math.floor(s/60), sec = s%60;
    return `${m}:${sec.toString().padStart(2,'0')}`;
  },

  triggerLoopEnd() {
    if (this.gameOver) return;
    clearInterval(this.timerInterval);
    this.loopHistory.push({loop: this.loop, actions: [...this.currentLoopActions]});
    const flash = document.getElementById('loop-flash');
    flash.style.opacity = '0.8';
    setTimeout(() => { flash.style.opacity = '0'; this.resetLoop(); }, 400);
  },

  resetLoop() {
    this.loop++;
    this.time = 600;
    this.actionsThisLoop = 0;
    this.currentLoopActions = [];
    this.currentLocation = null;
    document.getElementById('loop-num').textContent = this.loop;
    document.getElementById('timer-bar').className = '';
    document.getElementById('timer-txt').className = '';
    this.updateTimerUI();
    clearInterval(this.timerInterval);
    this.startTimer();
    document.getElementById('scene-loc').textContent = 'LOOP ' + this.loop;
    document.getElementById('scene-ttl').textContent = 'The loop resets.';
    const body = document.getElementById('scene-body');
    body.innerHTML = `<div class="narr"><em>You wake again at the beginning.</em></div>
      <div class="narr">Everything has reset — except what you know. Your notes hold. The killer is still here.<br><br>
      ${this.loop>=3?`<em>You've lived through this ${this.loop-1} times. The truth is close.</em>`:'Use what you learned.'}</div>`;
    document.getElementById('choices').innerHTML = `<button class="cbtn" onclick="G.goHome()"><span class="ckey">A</span>Enter the scene</button>`;
    this.renderLocations();
    this.renderSuspects();
  },

  // ── CONFIDENCE ──────────────────────────────────────────────
  updateConfidence() {
    const c = this.story.confidence(this.knowledge);
    const el = document.getElementById('b-conf');
    el.textContent = c + '%';
    el.className = 'bval ' + (c>=80?'good':c>=50?'acc':c>=25?'warn':'');
  },

  // ── ACCUSE ──────────────────────────────────────────────────
  accusePrompt() {
    const left = 2 - this.accusationAttempts;
    if (left <= 0) return;
    const warn = left === 1
      ? `<p style="color:var(--danger);font-size:12px">⚠ Last attempt — a wrong accusation here ends the investigation.</p>`
      : `<p style="color:var(--accent3);font-size:12px">You have ${left} accusations remaining.</p>`;
    let btns = Object.entries(this.story.suspects).map(([id,s]) => {
      const susp = this.suspectSuspicion[id]||0;
      const trust = this.suspectTrust[id]||0;
      return `<button class="mbtn${susp>=5?' ':''}${susp>=5?'dng':''}" onclick="G.accuse('${id}')">${s.full} <span style="font-size:10px;color:var(--text3)">${s.role}</span></button>`;
    }).join('');
    this.showModal('File an Accusation',`LOOP ${this.loop} — ${left} ATTEMPT${left!==1?'S':''} LEFT`,null,
      `<p>Name the person you believe is responsible for ${this.story.victim}'s death.</p>${warn}`,
      btns+`<button class="mbtn" onclick="G.closeModal()">CANCEL</button>`);
  },

  accuse(suspectId) {
    this.closeModal();
    this.accusationAttempts++;
    const s = this.story.suspects[suspectId];
    if (s.guilty) {
      clearInterval(this.timerInterval);
      this.gameOver = true;
      setTimeout(() => this.showEndScreen('correct', suspectId), 300);
    } else {
      if (this.accusationAttempts >= 2) {
        clearInterval(this.timerInterval);
        this.gameOver = true;
        setTimeout(() => this.showEndScreen('fired', suspectId), 300);
      } else {
        setTimeout(() => {
          this.showModal('Wrong Person.', 'ACCUSATION REJECTED',
            [{label:'CONTINUE', cb:()=>{}}],
            `<p><b>${s.full}</b> was questioned and released. Their alibi held.</p>
             <p>The real killer now knows you're close. They've had time to prepare.</p>
             <p style="color:var(--danger)">One accusation remaining.</p>`);
          this.knowledge.add('made_wrong_accusation');
          this.updateAccuseBtn();
        }, 300);
      }
    }
  },

  updateAccuseBtn() {
    const btn = document.getElementById('accuse-btn');
    const left = 2 - this.accusationAttempts;
    if (left <= 0 || this.gameOver) {
      btn.style.opacity = '0.3'; btn.style.cursor = 'not-allowed';
      btn.textContent = 'ACCUSE (0 left)'; btn.onclick = null;
    } else {
      btn.style.opacity = '1'; btn.style.cursor = 'pointer';
      btn.textContent = `ACCUSE (${left} left)`;
      btn.onclick = () => G.accusePrompt();
    }
  },

  // ── ENDINGS ─────────────────────────────────────────────────
  showEndScreen(type, suspectId) {
    const s = this.story.suspects[suspectId];
    const tier = this.story.endingTier(this.knowledge);
    const conf = this.story.confidence(this.knowledge);
    const clues = [...this.knowledge].filter(k=>k.startsWith('clue_')).length;
    const loopWord = this.loop===1?'1 loop':this.loop+' loops';
    let e;
    if (type === 'fired') {
      e = {
        sub:'INVESTIGATION TERMINATED', title:'Two strikes. Done.',
        color:'var(--danger)',
        body:`<p>Your second accusation — <b>${s?s.full:'innocent person'}</b> — proved as wrong as your first.</p>
        <p>The investigation was handed to a different team. You were removed.</p>
        <p style="color:var(--danger)">The real killer was never charged. The file was closed.</p>
        <p style="color:var(--text3)">The loop didn't break. It just stopped giving you chances.</p>`
      };
    } else {
      e = this.story.endings[tier] || this.story.endings['gut'];
    }
    const overlay = document.createElement('div');
    overlay.className = 'modal-ov';
    const box = document.createElement('div');
    box.className = 'modal-box';
    box.innerHTML = `
      <div class="modal-sub" style="color:${e.color}">${e.sub}</div>
      <div class="modal-ttl" style="color:${e.color}">${e.title}</div>
      <div class="end-stats">LOOPS: <span>${loopWord}</span>&nbsp;&nbsp;CONFIDENCE: <span>${conf}%</span>&nbsp;&nbsp;CLUES: <span>${clues}</span></div>
      <div class="modal-body">${e.body}</div>
      <button class="mbtn primary" onclick="G.backToMenu();document.querySelector('.modal-ov').remove()">← BACK TO MENU</button>
      <button class="mbtn" onclick="G.restartStory()">TRY AGAIN</button>
    `;
    overlay.appendChild(box);
    document.body.appendChild(overlay);
  },

  restartStory() {
    document.querySelectorAll('.modal-ov').forEach(m=>m.remove());
    this.startStory(this.story);
  },

  // ── MODALS ──────────────────────────────────────────────────
  showModal(title, subtitle, btns, body, customBtns) {
    this.closeModal();
    const ov = document.createElement('div');
    ov.className = 'modal-ov'; ov.id = 'active-modal';
    const box = document.createElement('div');
    box.className = 'modal-box';
    const btnHTML = customBtns || (btns?btns.map(b=>`<button class="mbtn primary">${b.label}</button>`).join(''):'');
    box.innerHTML = `
      <div class="modal-sub">${subtitle||''}</div>
      <div class="modal-ttl">${title}</div>
      ${body?`<div class="modal-body">${body}</div>`:''}
      <div>${btnHTML}</div>
    `;
    if (btns) {
      const buttons = box.querySelectorAll('.mbtn');
      btns.forEach((b,i) => { if(b.cb) buttons[i].onclick = ()=>{this.closeModal(); b.cb();}; });
    }
    ov.appendChild(box);
    document.body.appendChild(ov);
  },

  closeModal() {
    const m = document.getElementById('active-modal');
    if (m) m.remove();
  },

  showHelp() {
    this.showModal('How to Play', 'TIME-LOOP INVESTIGATION',
      [{label:'GOT IT', cb:()=>{}}],
      `<p>You have <b>10 minutes (6 actions)</b> per loop. When time runs out the loop resets — but <b>all notes and knowledge persist</b>.</p>
      <p>Talk to NPCs across multiple loops to build trust — they'll reveal more with each conversation.</p>
      <p>You have <b>2 accusations</b>. A wrong one continues the loop with a penalty. Two wrong accusations ends the investigation permanently.</p>
      <p>There are <b>multiple endings</b> — the more evidence you gather before accusing, the more complete your resolution.</p>
      <p style="color:var(--accent3)">Tip: Build trust with multiple NPCs across loops. The best endings require evidence from several sources.</p>`);
  }
};

// keyboard shortcuts
document.addEventListener('keydown', e => {
  const choices = document.querySelectorAll('.cbtn');
  const idx = e.key.toUpperCase().charCodeAt(0) - 65;
  if (idx >= 0 && idx < choices.length) choices[idx].click();
});

window.onload = () => G.init();
</script>
</body>
</html>

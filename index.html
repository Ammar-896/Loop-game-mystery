<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOOP — Time Investigation</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f;--bg2:#111118;--bg3:#18181f;--surface:#1e1e28;--surface2:#252530;
  --border:rgba(180,160,255,0.12);--border2:rgba(180,160,255,0.22);
  --accent:#b4a0ff;--accent2:#7fd4c1;--accent3:#ff9e7a;--danger:#ff6b6b;
  --text:#e8e4f5;--text2:#a09abf;--text3:#6a6480;
  --mono:'Share Tech Mono',monospace;--serif:'Playfair Display',serif;--sans:'DM Sans',sans-serif;
  --glow:0 0 20px rgba(180,160,255,0.15);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:9999;}

/* ─── SCREENS ─── */
#screen-menu,#screen-game{position:fixed;inset:0;transition:opacity 0.4s;overflow-y:auto;}
#screen-game{opacity:0;pointer-events:none;overflow:hidden;}
#screen-game.active{opacity:1;pointer-events:all;}
#screen-menu.hidden{opacity:0;pointer-events:none;}

/* ─── MENU ─── */
#menu-bg{position:fixed;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(180,160,255,0.06) 0%,transparent 60%),radial-gradient(ellipse at 70% 20%,rgba(127,212,193,0.04) 0%,transparent 50%);pointer-events:none;}
#menu-inner{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh;padding:40px 40px 60px;}
@media(max-width:600px){#menu-inner{padding:24px 16px 40px;}}
#menu-header{margin-bottom:48px;}
.menu-logo{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:4px;margin-bottom:12px;}
.menu-title{font-family:var(--serif);font-size:clamp(36px,5vw,64px);color:var(--text);line-height:1.1;margin-bottom:8px;}
.menu-sub{font-size:14px;color:var(--text3);font-family:var(--mono);letter-spacing:1px;}
#stories-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;flex:1;}
@media(max-width:600px){#stories-grid{grid-template-columns:1fr;}}
.story-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden;}
.story-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 60%,rgba(180,160,255,0.03));pointer-events:none;}
.story-card:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,0.4),var(--glow);}
.story-card:hover .card-play{opacity:1;transform:translateX(0);}
.card-num{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:2px;margin-bottom:10px;}
.card-title{font-family:var(--serif);font-size:18px;color:var(--text);margin-bottom:4px;}
.card-setting{font-size:11px;color:var(--accent);font-family:var(--mono);letter-spacing:1px;margin-bottom:10px;}
.card-desc{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:14px;}
.card-tags{display:flex;gap:6px;flex-wrap:wrap;}
.card-tag{font-size:10px;padding:3px 8px;border-radius:3px;background:rgba(180,160,255,0.08);border:1px solid var(--border);color:var(--text3);font-family:var(--mono);}
.card-play{position:absolute;bottom:16px;right:16px;font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:2px;opacity:0;transform:translateX(8px);transition:all 0.2s;}
.card-difficulty{position:absolute;top:16px;right:16px;font-family:var(--mono);font-size:9px;padding:3px 7px;border-radius:3px;}
.diff-easy{background:rgba(127,212,193,0.1);color:var(--accent2);border:1px solid rgba(127,212,193,0.2);}
.diff-med{background:rgba(255,158,122,0.1);color:var(--accent3);border:1px solid rgba(255,158,122,0.2);}
.diff-hard{background:rgba(255,107,107,0.1);color:var(--danger);border:1px solid rgba(255,107,107,0.2);}

/* ─── GAME UI ─── */
#game-wrapper{display:grid;grid-template-columns:270px 1fr 250px;grid-template-rows:60px 1fr 170px;height:100vh;max-height:100vh;overflow:hidden;}
@media(max-width:900px){
  #game-wrapper{grid-template-columns:1fr;grid-template-rows:56px 1fr auto auto;}
  #topbar{grid-column:1;}
  #left-panel{display:none;}
  #right-panel{display:none;}
  #scene-panel{grid-row:2;grid-column:1;}
  #bottom-bar{grid-row:3;grid-column:1;flex-wrap:wrap;height:auto;padding:8px 12px;}
}
#topbar{grid-column:1/-1;display:flex;align-items:center;padding:0 20px;background:var(--bg2);border-bottom:1px solid var(--border);gap:24px;}
#topbar::after{content:'';position:absolute;top:60px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.3;}
.game-title-bar{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:3px;}
.back-btn{font-family:var(--mono);font-size:10px;color:var(--text3);cursor:pointer;letter-spacing:1px;padding:6px 10px;border:1px solid var(--border);border-radius:4px;transition:all 0.2s;}
.back-btn:hover{color:var(--text);border-color:var(--border2);}
#loop-display{display:flex;align-items:center;gap:16px;margin-left:auto;}
.loop-label{font-family:var(--mono);font-size:11px;color:var(--text3);}
.loop-label span{color:var(--accent);font-size:16px;}
#timer-wrap{width:160px;height:3px;background:var(--surface);border-radius:2px;overflow:hidden;}
#timer-bar{height:100%;width:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:2px;transition:width 1s linear;}
#timer-bar.crit{background:linear-gradient(90deg,var(--danger),var(--accent3));}
#timer-txt{font-family:var(--mono);font-size:15px;color:var(--text);min-width:36px;text-align:right;}
#timer-txt.crit{color:var(--danger);}

#left-panel{grid-row:2;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.panel-hdr{padding:12px 14px 10px;font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:2px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.pdot{width:5px;height:5px;border-radius:50%;background:var(--accent);box-shadow:0 0 5px var(--accent);}
#map-list{flex:1;overflow-y:auto;padding:10px;-webkit-overflow-scrolling:touch;}
#map-list::-webkit-scrollbar{width:3px;}
#map-list::-webkit-scrollbar-thumb{background:var(--border2);}
.mloc{padding:9px 11px;border:1px solid var(--border);border-radius:5px;cursor:pointer;transition:all 0.18s;margin-bottom:6px;background:var(--bg3);position:relative;}
.mloc:hover{border-color:var(--border2);background:var(--surface);transform:translateX(2px);}
.mloc.active{border-color:var(--accent);background:var(--surface);box-shadow:var(--glow);}
.mloc.locked{opacity:0.35;cursor:not-allowed;}
.mloc.locked:hover{transform:none;background:var(--bg3);border-color:var(--border);}
.mloc.visited::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent2);border-radius:5px 0 0 5px;}
.mln{font-size:12px;font-weight:500;color:var(--text);margin-bottom:2px;}
.mlh{font-size:10px;color:var(--text3);font-family:var(--mono);}
.mbadge{position:absolute;top:7px;right:7px;width:16px;height:16px;border-radius:50%;background:var(--accent3);color:var(--bg);font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:var(--mono);}

#scene-panel{grid-row:2;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;min-height:0;}
#scene-hdr{padding:18px 24px 14px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;}
#scene-loc{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:2px;margin-bottom:5px;}
#scene-ttl{font-family:var(--serif);font-size:20px;color:var(--text);}
#scene-body{flex:1;overflow-y:auto;padding:20px 24px;-webkit-overflow-scrolling:touch;}
#scene-body::-webkit-scrollbar{width:3px;}
#scene-body::-webkit-scrollbar-thumb{background:var(--border2);}
#choices{padding:12px 24px 16px;display:flex;flex-direction:column;gap:6px;border-top:1px solid var(--border);background:var(--bg2);min-height:52px;flex-shrink:0;overflow-y:auto;max-height:220px;}
@media(max-width:900px){
  #scene-hdr{padding:12px 16px 10px;}
  #scene-ttl{font-size:17px;}
  #scene-body{padding:14px 16px;}
  #choices{padding:10px 16px 12px;max-height:200px;}
}

.npc-block{margin-bottom:20px;animation:fadeUp 0.3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.npc-name{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--accent);margin-bottom:5px;display:flex;align-items:center;gap:6px;}
.ntag{font-size:9px;padding:2px 5px;border-radius:3px;}
.ntag.suspicious{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.2);color:var(--danger);}
.ntag.friendly{background:rgba(127,212,193,0.1);border:1px solid rgba(127,212,193,0.2);color:var(--accent2);}
.ntag.neutral{background:rgba(180,160,255,0.08);border:1px solid var(--border);color:var(--accent);}
.ntag.remembers{background:rgba(180,160,255,0.1);border:1px solid rgba(180,160,255,0.2);color:var(--accent);}
.npc-speech{font-size:13px;line-height:1.7;color:var(--text2);padding:10px 14px;border-left:2px solid var(--border2);background:var(--bg2);border-radius:0 5px 5px 0;font-style:italic;}
.npc-speech.rem{border-left-color:var(--accent);background:rgba(180,160,255,0.04);}
.narr{font-size:13px;line-height:1.8;color:var(--text2);margin-bottom:16px;}
.narr b{color:var(--text);font-weight:500;}
.narr em{color:var(--accent);font-style:normal;}
.clue-reveal{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:rgba(127,212,193,0.06);border:1px solid rgba(127,212,193,0.18);border-radius:7px;margin-bottom:16px;animation:clueIn 0.4s ease;}
@keyframes clueIn{from{opacity:0;transform:scale(0.97)}to{opacity:1;transform:scale(1)}}
.clue-ico{width:28px;height:28px;border-radius:5px;background:rgba(127,212,193,0.12);border:1px solid rgba(127,212,193,0.25);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--accent2);font-family:var(--mono);font-size:13px;}
.clue-txt{font-size:12px;line-height:1.5;color:var(--text2);}
.clue-txt strong{color:var(--accent2);font-weight:500;display:block;margin-bottom:2px;font-family:var(--mono);font-size:9px;letter-spacing:1px;}

.cbtn{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;cursor:pointer;transition:all 0.18s;text-align:left;width:100%;color:var(--text2);font-family:var(--sans);font-size:12px;}
.cbtn:hover{background:var(--surface);border-color:var(--border2);color:var(--text);transform:translateX(3px);}
.ckey{width:20px;height:20px;border-radius:3px;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;color:var(--text3);flex-shrink:0;}
.ccost{margin-left:auto;font-family:var(--mono);font-size:9px;color:var(--text3);}

#right-panel{grid-row:2;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;min-height:0;}
#notes-list{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:7px;-webkit-overflow-scrolling:touch;}
#notes-list::-webkit-scrollbar{width:3px;}
#notes-list::-webkit-scrollbar-thumb{background:var(--border2);}
.note{padding:9px 11px;border-radius:5px;border:1px solid var(--border);background:var(--bg3);}
.note.clue{border-color:rgba(127,212,193,0.2);}
.note.suspect{border-color:rgba(255,107,107,0.18);}
.note.loop{border-color:rgba(180,160,255,0.18);}
.note-lbl{font-family:var(--mono);font-size:8px;letter-spacing:1.5px;margin-bottom:3px;}
.note.clue .note-lbl{color:var(--accent2);}
.note.suspect .note-lbl{color:var(--danger);}
.note.loop .note-lbl{color:var(--accent);}
.note-cnt{font-size:11px;line-height:1.5;color:var(--text2);}
.note-cnt strong{color:var(--text);font-weight:500;}
.notes-empty{font-family:var(--mono);font-size:10px;color:var(--text3);text-align:center;padding:20px 10px;line-height:1.8;}

#bottom-bar{grid-column:1/-1;background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0;}
@media(max-width:900px){
  #bottom-bar{padding:8px 12px;flex-wrap:nowrap;gap:0;}
  .bsec{padding:6px 10px;}
  .blbl{font-size:7px;}
  .bval{font-size:11px;}
}
.bsec{display:flex;flex-direction:column;justify-content:center;gap:3px;padding:10px 14px;border-right:1px solid var(--border);min-width:fit-content;}
.blbl{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:2px;}
.bval{font-family:var(--mono);font-size:12px;color:var(--text);}
.bval.acc{color:var(--accent);}
.bval.good{color:var(--accent2);}
.bval.warn{color:var(--accent3);}
.bval.bad{color:var(--danger);}
.suspects-row{display:flex;gap:7px;align-items:center;}
.sp{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:default;}
.sp-circle{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:11px;color:var(--text2);background:var(--bg3);font-style:italic;transition:all 0.2s;}
.sp.hi .sp-circle{border-color:var(--danger);color:var(--danger);}
.sp.trust .sp-circle{border-color:var(--accent);color:var(--accent);}
.sp-name{font-size:8px;color:var(--text3);font-family:var(--mono);}

#loop-flash{position:fixed;inset:0;background:var(--accent);opacity:0;pointer-events:none;z-index:9998;transition:opacity 0.1s;}
@keyframes glitch{0%,90%,100%{transform:translate(0)}91%{transform:translate(-2px,1px)}93%{transform:translate(2px,-1px)}95%{transform:translate(-1px,2px)}97%{transform:translate(1px,-2px)}}
.glitch{animation:glitch 8s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 4px var(--accent)}50%{box-shadow:0 0 10px var(--accent)}}
.pulse{animation:pulse 2s infinite;}

.modal-ov{position:fixed;inset:0;background:rgba(10,10,15,0.92);display:flex;align-items:center;justify-content:center;z-index:1000;animation:mfade 0.2s ease;}
@keyframes mfade{from{opacity:0}to{opacity:1}}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:28px;max-width:500px;width:92%;box-shadow:0 0 60px rgba(0,0,0,0.8);animation:mscale 0.25s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes mscale{from{transform:scale(0.9);opacity:0}to{transform:scale(1);opacity:1}}
.modal-sub{font-family:var(--mono);font-size:10px;letter-spacing:2px;margin-bottom:6px;}
.modal-ttl{font-family:var(--serif);font-size:22px;color:var(--text);margin-bottom:14px;}
.modal-body{font-size:13px;line-height:1.7;color:var(--text2);margin-bottom:18px;max-height:300px;overflow-y:auto;}
.modal-body p{margin-bottom:10px;}
.mbtn{padding:10px 20px;border-radius:5px;border:1px solid var(--border2);background:var(--surface);color:var(--text);font-family:var(--mono);font-size:11px;letter-spacing:1px;cursor:pointer;transition:all 0.18s;display:inline-block;margin:3px 6px 3px 0;}
.mbtn:hover{background:var(--surface2);border-color:var(--accent);color:var(--accent);}
.mbtn.primary{background:var(--accent);color:var(--bg);border-color:var(--accent);}
.mbtn.primary:hover{background:#c8b8ff;}
.mbtn.dng:hover{border-color:var(--danger);color:var(--danger);}

/* end screen stats */
.end-stats{display:flex;gap:20px;margin:10px 0 14px;font-family:var(--mono);font-size:10px;color:var(--text3);}
.end-stats span{color:var(--text);}
</style>
</head>
<body>
<div id="loop-flash"></div>

<!-- MENU SCREEN -->
<div id="screen-menu">
  <div id="menu-bg"></div>
  <div id="menu-inner">
    <div id="menu-header">
      <div class="menu-logo glitch">LOOP — TIME INVESTIGATION ENGINE</div>
      <div class="menu-title">Choose Your Loop</div>
      <div class="menu-sub">10 mysteries. 10 minutes each. Information is all you keep.</div>
    </div>
    <div id="stories-grid"></div>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="screen-game">
  <div id="game-wrapper">
    <div id="topbar">
      <div class="back-btn" onclick="G.backToMenu()">← MENU</div>
      <div class="game-title-bar glitch" id="story-title-bar">LOOP-00</div>
      <div id="loop-display">
        <div class="loop-label">LOOP <span id="loop-num">1</span></div>
        <div id="timer-wrap"><div id="timer-bar"></div></div>
        <div id="timer-txt">10:00</div>
      </div>
    </div>
    <div id="left-panel">
      <div class="panel-hdr"><div class="pdot pulse"></div>LOCATIONS</div>
      <div id="map-list"></div>
    </div>
    <div id="scene-panel">
      <div id="scene-hdr">
        <div id="scene-loc">SELECT A LOCATION</div>
        <div id="scene-ttl">Where will you go?</div>
      </div>
      <div id="scene-body"></div>
      <div id="choices"></div>
    </div>
    <div id="right-panel">
      <div class="panel-hdr" style="gap:8px"><div class="pdot" style="background:var(--accent2);box-shadow:0 0 5px var(--accent2)"></div>NOTES</div>
      <div id="notes-list"><div class="notes-empty" id="notes-empty">No evidence yet.<br>Information persists<br>across loops.</div></div>
    </div>
    <div id="bottom-bar">
      <div class="bsec">
        <div class="blbl">CASE</div>
        <div class="bval acc" id="b-case" style="font-size:10px">—</div>
      </div>
      <div class="bsec">
        <div class="blbl">SUSPECTS</div>
        <div class="suspects-row" id="b-suspects"></div>
      </div>
      <div class="bsec">
        <div class="blbl">CONFIDENCE</div>
        <div class="bval acc" id="b-conf">0%</div>
      </div>
      <div class="bsec">
        <div class="blbl">ACTIONS</div>
        <div class="bval" id="b-actions">6 left</div>
      </div>
      <div style="margin-left:auto;padding:0 12px;display:flex;gap:8px;align-items:center;">
        <button class="mbtn" onclick="G.accusePrompt()" id="accuse-btn">ACCUSE (2 left)</button>
        <button class="mbtn" onclick="G.showHelp()">?</button>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// STORY DEFINITIONS — 10 mysteries
// Each story: title, setting, intro, suspects[], locations{}, endings{}
// ═══════════════════════════════════════════════════════════════
const STORIES = [

// ─── STORY 1: THE HARGROVE INCIDENT ───────────────────────────
{
  id:'hargrove', title:'The Hargrove Incident', setting:'English Country Estate, 1962',
  desc:'A shipping magnate found dead. Cardiac arrest — officially. But you\'ve seen it happen before, and it wasn\'t natural.',
  tags:['MURDER','POISON','FRAUD'], difficulty:'med',
  victim:'Victor Hargrove', crime:'poisoning',
  intro:`<p>Victor Hargrove, patriarch of Hargrove Shipping, has been found dead in his study. The official verdict: cardiac arrest.</p><p>You've seen him die before. You know better. You have ten minutes before the loop resets — find the killer.</p>`,
  suspects:{
    felix:{name:'Felix',full:'Felix Crane',init:'FC',role:'Business partner',guilty:true},
    eleanor:{name:'Eleanor',full:'Eleanor Hargrove',init:'EH',role:"Victim's wife",guilty:false},
    drwu:{name:'Dr. Wu',full:'Dr. Sandra Wu',init:'SW',role:'Family physician',guilty:false},
    vera:{name:'Vera',full:'Vera Solano',init:'VS',role:'Household staff',guilty:false},
  },
  locations:{
    study:{name:'The Study',sub:'Victor\'s Private Study',desc:'Books line the walls. A half-finished whiskey sits on the desk, untouched.',
      actions:['study_desk','study_whiskey','study_bookshelf','study_window']},
    library:{name:'The Library',sub:'East Wing Library',desc:'High shelves. A leather chair angled to the fireplace — recently used.',
      actions:['lib_felix','lib_ledger','lib_fireplace']},
    kitchen:{name:'The Kitchen',sub:'Ground Floor Kitchen',desc:'Vera moves with practiced efficiency. She looks up — surprised, then guarded.',
      actions:['kit_vera','kit_medicine']},
    garden:{name:'The Garden',sub:'East Garden',desc:'Eleanor stands alone in the fog. Her eyes are red.',
      actions:['gar_eleanor','gar_footprints']},

  actions:{
    study_desk:{label:"Examine Victor's desk",cost:'~1 min',

    study_bookshelf:{label:'Search the bookshelf',cost:'~2 min',

    study_window:{label:'Look out the window',cost:'~30 sec',

      }},
    lib_felix:{label:'Speak with Felix Crane',cost:'~2 min',
      run(G){
        const tr=G.trust('felix'); G.addTrust('felix');
        let sp,tag='neutral',rem=G.loop>1&&tr>0;
        if(tr>=2){tag='friendly';sp=`"You again." He sighs. "Victor and I had disagreements. Business ones. That doesn't make me a killer." He glances at the door. "There are things I haven't said yet."`;

        }else if(G.knows('confronted_felix')&&G.loop>1){tag='suspicious';sp=`His eyes narrow. "I've seen you before. Haven't I?" He shakes his head. "Impossible." He straightens. "I have nothing to say."`;G.addSusp('felix',1);}
        else sp=`"A terrible business." He swirls his brandy without drinking. "Victor had enemies. Successful men do." He smiles thinly.`;

        return{npc:{name:'Felix Crane',tag,sp,rem},acts};

    lib_felix_press:{label:'Confront Felix about the debt',cost:'~1 min',
      avail(G){return G.trust('felix')>=1;},
      run(G){
        G.learn('confronted_felix');G.addSusp('felix',2);
        const sp=`Felix's composure fractures. "Where did you hear—" He collects himself. "Victor loaned me money once. Years ago. It was repaid." A pause that says otherwise. "Fully."`;
        G.clue('felix_debt','Felix\'s Debt','Victor loaned Felix £240k. Felix claims repaid. His reaction suggests otherwise.','suspect');
        if(G.knows('torn_note')){
          return{npc:{name:'Felix Crane',tag:'suspicious',sp,rem:true},acts:['lib_felix_note','lib_ledger','_leave']};
        }
        return{npc:{name:'Felix Crane',tag:'suspicious',sp,rem:true},acts:['lib_ledger','_leave']};
      }},
    lib_felix_note:{label:'Show Felix the torn note',cost:'~1 min',
      avail(G){return G.knows('torn_note')&&G.knows('confronted_felix');},
      run(G){
        G.addSusp('felix',3);G.learn('felix_caught');
        const sp=`The color drains from his face. His hands tighten on the glass. "That's out of context. Victor was going to ruin me. Destroy everything." His voice drops. "Would you just stand there?"`;
        G.clue('felix_motive','Felix\'s Motive','Victor was about to expose Felix. Felix all but admits it. Panic visible.','suspect');
        return{npc:{name:'Felix Crane',tag:'suspicious',sp,rem:true},acts:['_leave']};
      }},
    lib_ledger:{label:'Examine the account ledger',cost:'~2 min',

        return{narr:t,acts:['lib_felix','lib_fireplace','_leave']};
      }},
    lib_fireplace:{label:'Sift the fireplace ashes',cost:'~2 min',
      run(G){
        let t='<p>Still warm. Someone burned documents recently. Fragments: a solicitor\'s letterhead and <b>"...hereby amend the beneficiary to..."</b></p>';
        G.clue('burned_will','Burned Document','Someone amended and burned Victor\'s will. Who had access to the library?','clue');

    kit_vera:{label:'Speak with Vera Solano',cost:'~2 min',
      run(G){
        const tr=G.trust('vera');G.addTrust('vera');
        let sp,tag='neutral',rem=G.loop>1&&tr>0;
        if(tr>=2){tag='friendly';sp=`"I shouldn't say this." She lowers her voice. "That evening — Mr. Crane came in here alone. Said he needed something for Mr. Victor's drink. He knew where the bitters were kept."`;
          G.learn('vera_witness');G.learn('vault_hint');

        }else if(tr===1){tag='friendly';sp=`She refills your cup. "There are things I've seen in this house. Things I'm afraid to say." She shakes her head. "I'm not ready."`;
        }else sp=`She keeps her eyes on her work. "I just cook and clean. I don't ask questions — it's healthier that way."`;

    kit_vera_vault:{label:'Ask Vera about the vault combination',cost:'~1 min',
      avail(G){return G.trust('vera')>=1&&G.knows('knows_vault');},
      run(G){
        let sp;
        if(G.trust('vera')>=2||G.knows('vault_hint')){
          sp=`She thinks. "Mr. Victor changed it last month. He told me — said I was the only one he trusted." She writes on a napkin: <b>4-7-2-9</b>. "Please don't let them know."`;

        return{npc:{name:'Vera Solano',tag:'friendly',sp,rem:true},acts:['kit_vera','kit_medicine','_leave']};
      }},
    kit_medicine:{label:'Check the medicine cabinet',cost:'~1 min',
      run(G){
        let t='<p>Standard medicines. But on the bottom shelf — an <b>unmarked brown bottle</b>, nearly empty. Floral, sharp smell.</p>';
        G.clue('bottle','Aconitine Bottle','Unmarked bottle in kitchen. Near-empty. Floral-sharp smell matches the whiskey residue.','suspect');
        return{narr:t,acts:['kit_vera','_leave']};

    gar_eleanor:{label:'Approach Eleanor',cost:'~2 min',
      run(G){
        const tr=G.trust('eleanor');G.addTrust('eleanor');
        let sp,tag='neutral',rem=G.loop>1&&tr>0;
        if(tr>=2){tag='friendly';sp=`"Victor changed after Felix came back. Secretive. Afraid." She wraps her arms around herself. "Two weeks ago he said: 'If anything happens to me, look at who benefits most.' I didn't understand then."`;
          G.learn('victim_warned');G.clue('warning','Victor\'s Warning',"Victor told Eleanor to 'look at who benefits most' two weeks before his death.",'clue');
        }else if(tr===1){tag='friendly';sp=`"Victor was frightened of something these last weeks. He wouldn't say what." She finally meets your eyes. "I don't think it was an accident."`;
        }else sp=`"I need a moment. Please."`;
        let acts=['gar_footprints'];
        if(tr>=1)acts.push('gar_eleanor_more');

    gar_eleanor_more:{label:"Ask about Victor's last weeks",cost:'~1 min',
      avail(G){return G.trust('eleanor')>=1;},
      run(G){
        G.learn('felix_context');
        const sp=`"Felix came to Victor three years ago, desperate. Victor saved his firm. But then Felix started skimming — diverting client funds. Victor discovered it six months ago. He was going to the regulators."`;

    gar_footprints:{label:'Examine the garden path',cost:'~1 min',

        return{narr:t,acts:['gar_eleanor','_leave']};
      }},
    cli_drwu:{label:'Speak with Dr. Wu',cost:'~2 min',
      run(G){
        const tr=G.trust('drwu');G.addTrust('drwu');
        let sp,tag='neutral',rem=G.loop>1&&tr>0;
        if(tr>=2){tag='friendly';sp=`She closes the door. "I signed the death certificate. Cardiac arrest." Her voice drops. "But I had doubts. I ran additional bloods — off the record. Found alkaloid compounds. I didn't report it because I was afraid."`;
          G.learn('drwu_report');G.clue('drwu_secret',"Dr. Wu's Secret Report",'Dr. Wu ran private bloods. Found alkaloid toxicity. Concealed from police out of fear.','clue');
        }else if(tr===1){tag='neutral';sp=`"Victor was in good health for his age. Cardiac events are unpredictable." She holds your gaze a beat too long. "Some things are better left alone."`;
        }else sp=`"A tragic loss." She folds her hands precisely. "A sudden cardiac event. These things happen."`;
        let acts=['cli_records'];
        if(tr>=1&&G.knows('poison'))acts.push('cli_confront');
        acts.push('_leave');
        return{npc:{name:'Dr. Sandra Wu',tag,sp,rem},acts};

    cli_confront:{label:'Present the Aconitine evidence',cost:'~1 min',
      avail(G){return G.knows('poison')&&G.trust('drwu')>=1;},
      run(G){
        const sp=`She stares at you. Something moves behind her eyes — not guilt. Fear. "You understand the implications. If Victor was murdered, the killer is still in that house." She breathes. "I need to know you understand that."`;

        return{npc:{name:'Dr. Sandra Wu',tag:'suspicious',sp,rem:true},acts:['cli_drwu','cli_records','_leave']};
      }},
    cli_records:{label:'Browse medical records',cost:'~2 min',
      run(G){
        let t='<p>A consultation record for <b>Felix Crane</b>, three weeks ago. Anxiety medication. Note: <b>"Patient expressed fear of exposure. Do not disclose."</b></p>';

    vlt_open:{label:'Enter combination (4-7-2-9)',cost:'~1 min',
      avail(G){return G.knows('vault_code');},
      run(G){
        G.learn('vault_open');

    vlt_contract:{label:'Read the document',cost:'~1 min',

        let t='<p>Surveillance photographs — from the study window. Subject: <b>Felix Crane</b>, meeting a courier repeatedly over three weeks. Victor was documenting everything.</p>';

        return{narr:t,acts:['vlt_contract','_leave']};

  confidence(k){
    let s=0;
    if(k.has('felix_debt'))s+=10;if(k.has('poison'))s+=10;if(k.has('felix_caught'))s+=15;
    if(k.has('vera_testimony'))s+=20;if(k.has('fraud_confirmed'))s+=15;if(k.has('drwu_report'))s+=10;
    if(k.has('felix_photos'))s+=10;if(k.has('felix_motive'))s+=10;
    return Math.min(s,100);
  },
  endingTier(k){
    if(k.has('fraud_confirmed')&&k.has('vera_testimony')&&k.has('drwu_report')&&k.has('felix_photos')&&k.has('victim_warned'))return'perfect';
    if(k.has('fraud_confirmed')&&k.has('vera_testimony')&&k.has('vault_open'))return'full';
    if(k.has('felix_caught')&&k.has('poison')&&(k.has('vera_testimony')||k.has('drwu_report')))return'strong';
    if(k.has('felix_debt')&&k.has('poison'))return'circumstantial';
    if(k.has('torn_note')||k.has('felix_debt'))return'gut';
    return'blind';
  },
  endings:{
    perfect:{sub:'★ PERFECT RESOLUTION',title:'The whole truth.',color:'var(--accent2)',body:`<p>Felix Crane was arrested before midnight — for murder <i>and</i> two years of systematic fraud. Dr. Wu came forward with her toxicology report. Vera's testimony placed him at the drinks cabinet at 9:31pm. The vault evidence sealed it completely.</p><p>The FCA received Victor's letter posthumously. Felix's firm was dissolved. Four defrauded clients recovered losses. Eleanor received the estate. Vera was given a permanent home and generous settlement.</p><p style="color:var(--accent2);font-style:italic">You didn't just solve the murder. You dismantled everything Felix built on others' suffering. The loop broke cleanly — and stayed broken.</p>`},
    full:{sub:'CASE CLOSED',title:'Justice, complete.',color:'var(--accent)',body:`<p>Felix Crane was arrested that night. Vera's testimony, the vault documents, and the Aconitine formed a comprehensive case. The trial lasted four days. The jury deliberated two hours.</p><p>Felix's financial fraud was exposed in court. He received a life sentence. He never showed remorse.</p><p style="color:var(--text3)">A few threads remained loose — Dr. Wu's hidden report never made evidence. Small gaps, but the core held.</p><p style="color:var(--accent);font-style:italic">The loop dissolved the moment handcuffs clicked.</p>`},
    strong:{sub:'CASE CLOSED — STRONG EVIDENCE',title:'He goes to prison.',color:'var(--accent)',body:`<p>Your accusation held under scrutiny — barely. Felix's lawyers fought hard. The vault evidence was partially excluded on procedural grounds.</p><p>Felix received a reduced sentence: twelve years for manslaughter, fraud charges dropped. He walks in eight years, still wealthy from hidden accounts.</p><p style="color:var(--accent);font-style:italic">The loop ended. But you can't shake the feeling you left something on the table.</p>`},
    circumstantial:{sub:'WEAK EVIDENCE',title:'A conviction. Of sorts.',color:'var(--accent3)',body:`<p>Felix accepted a plea deal: accessory after the fact, two years suspended. He claimed Victor's death was accidental — that he'd only covered it up. The court had no hard evidence to contradict him.</p><p style="color:var(--danger)">He walked out six months later. Eleanor received nothing. Vera left quietly with a single suitcase.</p><p style="color:var(--accent3);font-style:italic">You named the right man. You just couldn't prove it.</p>`},
    gut:{sub:'RUSHED ACCUSATION',title:'A guess. And it showed.',color:'var(--accent3)',body:`<p>Felix's lawyers dismissed your evidence in a paragraph. Case dropped. That night Victor's study was cleaned. The vault was emptied. The whiskey glass disappeared.</p><p style="color:var(--accent3);font-style:italic">Somewhere, Felix Crane is having a very good year — because you moved too fast.</p>`},
    blind:{sub:'NO EVIDENCE',title:'You had nothing.',color:'var(--danger)',body:`<p>Felix was released within two hours. The investigation was shelved. Victor Hargrove's death remained officially cardiac arrest.</p><p style="color:var(--danger)">Felix attended the funeral. He gave the eulogy. He cried.</p>`},
  }
},

{

  tags:['MURDER','ART WORLD','JEALOUSY'], difficulty:'easy',
  victim:'Marcus Veld', crime:'blunt force',
  intro:`<p>Marcus Veld — the most feared critic in the art world — is dead. Found in the gallery's back room during his own retrospective opening. Blunt force trauma, staged to look like an accident.</p><p>Four people hated him enough to do it. You have ten minutes before the loop resets.</p>`,
  suspects:{

    otto:{name:'Otto',full:'Otto Brennan',init:'OB',role:'Gallery owner',guilty:false},
    claire:{name:'Claire',full:'Claire Mott',init:'CM',role:"Marcus's ex-wife",guilty:false},
    raj:{name:'Raj',full:'Raj Khatri',init:'RK',role:'Junior curator',guilty:false},
  },
  locations:{
    mainHall:{name:'Main Hall',sub:'Gallery Entrance',desc:'Guests mill about. Champagne glasses. The kind of laughter that hides nerves.',
      actions:['mh_otto','mh_guests','mh_cctv']},

      actions:['br_body','br_sculpture','br_footprint']},
    studio:{name:"Nina's Studio",sub:'Third Floor Studio',desc:"Nina's workspace. She's been here all evening, or so she claims.",
      actions:['st_nina','st_canvas','st_receipt']},
    officeRoom:{name:'Gallery Office',sub:"Otto's Office",desc:"Otto's office. He looks like a man who hasn't slept in three days.",
      actions:['of_otto','of_files','of_email']},
    lounge:{name:'VIP Lounge',sub:'Upper Level',desc:"Claire sits alone. She's the only person here who doesn't look surprised.",
      actions:['vip_claire','vip_letter','vip_bartender']},
  },
  actions:{
    mh_otto:{label:'Approach Otto in the hall',cost:'~1 min',run(G){
      const tr=G.trust('otto');G.addTrust('otto');
      let sp='',tag='neutral';
      if(tr>=2){tag='friendly';sp=`"Between us? Marcus was blackmailing half the people here. Including me." He straightens his lapel. "I paid him to stay quiet about a forgery scandal. Nina refused to pay. He was going to destroy her."`;G.learn('otto_blackmail');G.clue('blackmail','Blackmail Operation',"Marcus was blackmailing gallery figures. Nina refused. He was going to expose her publicly.",'suspect');}
      else if(tr===1)sp=`"Marcus had enemies. That's putting it gently. Tonight was supposed to be a celebration." He lowers his voice. "Instead it's a crime scene."`;
      else sp=`"A terrible night. Terrible." He gestures vaguely. "The police are handling it."`;
      return{npc:{name:'Otto Brennan',tag,sp,rem:G.loop>1&&tr>0},acts:['mh_guests','mh_cctv','_leave']};
    }},
    mh_guests:{label:'Listen to guest conversations',cost:'~1 min',run(G){
      G.clue('guests_talk','Guest Gossip',"Multiple guests mention Marcus 'had it coming'. One says Nina confronted him publicly last month.",'clue');
      return{narr:'<p>Fragments of conversation: <b>"...had it coming..."</b> and <b>"...Nina screamed at him at the Saatchi show..."</b> and <b>"...heard he was going to publish something devastating..."</b></p>',acts:['mh_otto','mh_cctv','_leave']};
    }},
    mh_cctv:{label:'Check the CCTV log',cost:'~2 min',run(G){
      G.clue('cctv','CCTV Log','Camera 4 shows Nina entering the back room at 9:14pm. Marcus entered at 9:17pm. No one else entered until 9:43pm when the body was found.','clue');
      G.learn('nina_cctv');
      return{narr:'<p>Camera 4: <b>Nina</b> enters back room at <b>9:14pm</b>. Marcus at <b>9:17pm</b>. No other entry until the body was found at 9:43. She was the only one who could have done it.</p>',acts:['mh_otto','mh_guests','_leave']};
    }},
    br_body:{label:'Examine the body',cost:'~1 min',run(G){
      G.clue('body_note','Body Evidence','Defensive wounds on Marcus\'s arms. He saw the attack coming. And there\'s a broken fingernail — not his.','clue');
      return{narr:'<p>Defensive wounds on his arms — he <b>saw it coming</b>. And caught in his lapel: a broken acrylic fingernail, dark red. Not his.',acts:['br_sculpture','br_footprint','_leave']};
    }},
    br_sculpture:{label:'Examine the bronze sculpture',cost:'~1 min',run(G){
      G.clue('sculpture','Murder Weapon','The sculpture was moved from Plinth 7. Blood trace on the base. Someone carried it deliberately.','suspect');
      G.learn('weapon_found');
      return{narr:'<p>The sculpture was moved from <b>Plinth 7</b> — across the room. Someone carried it deliberately. Blood trace on the base. This was planned, not impulsive.</p>',acts:['br_body','br_footprint','_leave']};
    }},
    br_footprint:{label:'Find a footprint',cost:'~30 sec',run(G){
      G.clue('footprint','Paint Footprint','A faint footprint in spilled paint — small shoe size. Bright ochre paint, the same as Nina\'s current canvas.','suspect');G.learn('footprint_found');
      return{narr:'<p>A faint footprint in spilled ochre paint. <b>Small shoe size</b>. The same ochre Nina\'s been working with upstairs.',acts:['br_body','br_sculpture','_leave']};
    }},
    st_nina:{label:'Speak with Nina Vasquez',cost:'~2 min',run(G){
      const tr=G.trust('nina');G.addTrust('nina');
      let sp,tag='neutral',rem=G.loop>1&&tr>0;
      if(tr>=2&&G.knows('nina_cctv')){tag='suspicious';sp=`She goes very still. "The camera..." She closes her eyes. "He was going to print it. Everything. My forgery. My scholarship application lies. He had everything." A pause. "I went to talk to him. He laughed at me."`;G.learn('nina_confession');G.clue('nina_conf','Nina\'s Near-Confession',"Nina confirms she went to confront Marcus. 'He laughed at me.' She knew about the camera.",'suspect');}
      else if(tr>=1){tag='neutral';sp=`"Marcus was vicious. He destroyed careers for sport." She looks at her hands. "I'm not going to pretend I'm sad."`;
      }else sp=`"I've been up here all evening. Ask anyone." But she won't meet your eyes.`;
      return{npc:{name:'Nina Vasquez',tag,sp,rem},acts:['st_canvas','st_receipt','_leave']};
    }},
    st_canvas:{label:"Examine Nina's current canvas",cost:'~1 min',run(G){
      G.clue('canvas','Nina\'s Canvas','Bright ochre paint, still wet — and paint missing from the tray. Consistent with a footprint left at the scene.','clue');G.learn('canvas_match');
      return{narr:'<p>Bright <b>ochre paint</b>, still wet. Paint missing from the tray in a distinctive pattern. Consistent with someone stepping through it in a hurry.</p>',acts:['st_nina','st_receipt','_leave']};
    }},
    st_receipt:{label:'Find the crumpled receipt',cost:'~1 min',run(G){
      G.clue('receipt','Pawn Shop Receipt','Receipt: Nina sold a piece last week for £200 cash. Marked "urgent — private sale." She needed money fast.','suspect');G.learn('nina_desperate');
      return{narr:'<p>Crumpled in the bin: a pawn receipt. Nina sold a piece for <b>£200 cash</b> last week. Marked <i>urgent — private sale.</i> She was desperate for money. <b>Blackmail payments?</b></p>',acts:['st_nina','_leave']};
    }},
    of_otto:{label:'Speak with Otto privately',cost:'~2 min',run(G){
      const tr=G.trust('otto');
      let sp='',tag='neutral',rem=G.loop>1&&tr>0;
      if(tr>=2){tag='friendly';sp=`"Nina came to me last week. Begged me to intervene with Marcus. I refused — I had my own problems." He rubs his face. "I should have helped her. Maybe this wouldn't have happened."`;G.learn('nina_begged');}
      else sp=`"Look, Marcus was complicated. We had a professional relationship. Nothing more."`;
      return{npc:{name:'Otto Brennan',tag,sp,rem},acts:['of_files','of_email','_leave']};
    }},
    of_files:{label:"Search Otto's filing cabinet",cost:'~2 min',run(G){
      G.clue('otto_files','Blackmail Records','Otto kept records of Marcus\'s demands. Nina\'s file shows she refused all three payment requests.','suspect');G.learn('nina_refused');
      return{narr:'<p>A folder marked <i>"MV — private."</i> Records of payments made to Marcus. <b>Nina\'s file</b> shows three refusals marked in red. She was the only one who wouldn\'t pay.</p>',acts:['of_otto','of_email','_leave']};
    }},
    of_email:{label:'Find the draft email',cost:'~1 min',run(G){
      G.clue('draft_email','Draft Email','Marcus had drafted a press release exposing Nina\'s scholarship fraud. Scheduled to send tonight at 10pm.','suspect');G.learn('marcus_email');
      return{narr:'<p>Open on Otto\'s screen — forwarded from Marcus: a <b>press release draft</b> exposing Nina\'s academic fraud. Scheduled to send at <b>10pm tonight.</b> She had two hours left before everything collapsed.</p>',acts:['of_otto','of_files','_leave']};
    }},
    vip_claire:{label:'Speak with Claire Mott',cost:'~2 min',run(G){
      const tr=G.trust('claire');G.addTrust('claire');
      let sp='',tag='neutral',rem=G.loop>1&&tr>0;
      if(tr>=2){tag='friendly';sp=`"I'm the obvious suspect, aren't I? The ex-wife." She laughs softly. "I have an alibi — I was on the phone with my solicitor from 9pm to 9:45. Fighting about the divorce settlement. Every minute is logged."`;G.learn('claire_alibi');}
      else sp=`"Marcus and I had history. Ancient history. Whatever happened, I didn't do it."`;
      return{npc:{name:'Claire Mott',tag,sp,rem},acts:['vip_letter','vip_bartender','_leave']};
    }},
    vip_letter:{label:'Find the letter in her bag',cost:'~1 min',run(G){
      G.clue('claire_letter',"Claire's Letter",'Letter from Marcus threatening legal action over unpaid alimony. But dated 6 months ago — resolved.','loop');G.learn('claire_resolved');
      return{narr:'<p>A letter from Marcus — but dated <b>six months ago</b>, threatening legal action. Handwritten annotation: <i>"RESOLVED 14 March."</i> Their dispute was settled. She had no current motive.</p>',acts:['vip_claire','vip_bartender','_leave']};
    }},
    vip_bartender:{label:'Ask the bartender about Nina',cost:'~1 min',run(G){
      G.clue('bartender','Bartender Account','Bartender confirms Nina left the VIP bar at 9:11pm, said "I need some air." Returned at 9:48pm, visibly shaken.','clue');G.learn('nina_timing');
      return{narr:'<p>The bartender: <b>"Nina left at 9:11, said she needed air. Came back 9:48 — shaking. Knocked over two glasses."</b> The timeline fits perfectly.',acts:['vip_claire','_leave']};
    }},
  },
  confidence(k){
    let s=0;
    if(k.has('nina_cctv'))s+=25;if(k.has('footprint_found'))s+=15;if(k.has('canvas_match'))s+=15;
    if(k.has('nina_confession'))s+=25;if(k.has('marcus_email'))s+=10;if(k.has('nina_timing'))s+=10;
    return Math.min(s,100);
  },
  endingTier(k){
    if(k.has('nina_confession')&&k.has('nina_cctv')&&k.has('marcus_email')&&k.has('footprint_found'))return'perfect';
    if(k.has('nina_cctv')&&k.has('footprint_found')&&k.has('nina_confession'))return'full';
    if(k.has('nina_cctv')&&k.has('canvas_match'))return'strong';
    if(k.has('nina_cctv')||k.has('footprint_found'))return'circumstantial';
    return'gut';
  },
  endings:{
    perfect:{sub:'★ COMPLETE CASE',title:'The full picture.',color:'var(--accent2)',body:`<p>Nina was arrested before she could leave the building. The CCTV footage, the ochre footprint matching her studio paint, and her near-confession — combined with Marcus's scheduled 10pm press release — formed an airtight case.</p><p>At trial, Nina's counsel entered a plea of guilty to manslaughter: she'd gone to beg Marcus one final time. He laughed. She snapped. The sculpture was close at hand.</p><p>Marcus's blackmail operation was exposed posthumously. Otto and two other gallery figures were fined. Nina received a seven-year sentence, reduced for cooperation.</p><p style="color:var(--accent2);font-style:italic">The loop closed. And you understood: even justified rage has consequences.</p>`},
    full:{sub:'CASE CLOSED',title:'Arrested.',color:'var(--accent)',body:`<p>Nina was arrested on the strength of the CCTV evidence and footprint match. She confessed during the second hour of questioning.</p><p>The blackmail operation was revealed during trial, complicating public sympathy. Nina received ten years.</p><p style="color:var(--accent);font-style:italic">Justice, imperfect and human, was done.</p>`},
    strong:{sub:'STRONG CASE',title:'Conviction secured.',color:'var(--accent)',body:`<p>The CCTV footage and paint match were enough. Nina's lawyers tried to argue contamination — they failed, narrowly.</p><p>She received twelve years. Marcus's estate sued unsuccessfully for damages.</p>`},
    circumstantial:{sub:'PARTIAL EVIDENCE',title:'A contested verdict.',color:'var(--accent3)',body:`<p>Nina was acquitted on the murder charge but convicted of assault. Two years suspended. She never returned to the art world.</p><p style="color:var(--accent3);font-style:italic">The gallery reopened three months later. Marcus's blackmail operation was never exposed.</p>`},
    gut:{sub:'INSUFFICIENT EVIDENCE',title:'She walked.',color:'var(--danger)',body:`<p>Your accusation lacked substance. Nina hired a sharp lawyer and was released without charge. She moved to Berlin six months later.</p><p style="color:var(--danger)">Marcus's press release — never sent — sat in a server until the gallery folded two years later.</p>`},
  }
},

// ─── STORY 3: THE SUNKEN MERIDIAN ────────────────────────────
{
  id:'meridian', title:'The Sunken Meridian', setting:'Research Submarine, North Atlantic',
  desc:"A marine biologist is found dead mid-dive. The submarine is sealed. The killer is still on board — and they're running out of air.",
  tags:['LOCKED ROOM','SCIENCE','PRESSURE'], difficulty:'hard',
  victim:'Dr. Petra Lenz', crime:'sabotage',
  intro:`<p>Three hundred meters below the North Atlantic. Dr. Petra Lenz — lead scientist of the Meridian project — is dead. Her oxygen line was cut. The submarine has been sealed since 0600. There are five people aboard, including you.</p><p>You have ten minutes before the loop resets. Find who cut the line.</p>`,
  suspects:{
    chen:{name:'Chen',full:'Dr. Kai Chen',init:'KC',role:'Marine biologist',guilty:false},
    rowan:{name:'Rowan',full:'Rowan Beck',init:'RB',role:'Engineer',guilty:true},
    alinta:{name:'Alinta',full:'Alinta Walsh',init:'AW',role:'Data analyst',guilty:false},
    hadley:{name:'Hadley',full:'Hadley Nourse',init:'HN',role:'Corporate observer',guilty:false},
  },
  locations:{
    bridge:{name:'The Bridge',sub:'Command Deck',desc:'Navigation screens flicker. The pressure gauges read normal. Someone here knows something.',
      actions:['br_hadley','br_logs','br_sonar']},
    lab:{name:'The Lab',sub:'Research Compartment',desc:'Petra\'s research station. Her data terminals are still active.',
      actions:['lab_chen','lab_data','lab_sample']},
    engine:{name:'Engine Room',sub:'Lower Deck',desc:'Rowan is here, running diagnostics. His movements are too practiced — like he\'s been expecting questions.',
      actions:['eng_rowan','eng_tools','eng_logs']},
    quarters:{name:'Quarters',sub:'Crew Berths',desc:'Alinta is reading. Or pretending to.',
      actions:['qt_alinta','qt_search','qt_diary']},
    airlock:{name:'Dive Airlock',sub:'Aft Section',desc:'The crime scene. The airlock where Petra\'s line was cut.',
      actions:['al_line','al_glove','al_scratches']},
  },
  actions:{
    br_hadley:{label:'Confront Hadley Nourse',cost:'~2 min',run(G){
      const tr=G.trust('hadley');G.addTrust('hadley');
      let sp='',tag='neutral',rem=G.loop>1&&tr>0;
      if(tr>=2){tag='friendly';sp=`"Meridian Corp sent me here to observe, yes. But the truth? Petra had found something they didn't want found. Thermal vents. Rare earth minerals worth billions." He exhales. "She was going to publish. Make it all public domain."`;G.learn('hadley_truth');G.clue('corp_motive','Corporate Motive','Petra discovered rare earth minerals worth billions. Meridian Corp wanted to suppress publication.','suspect');}
      else sp=`"I'm here in an observational capacity only. I have no involvement in any of this."`;
      return{npc:{name:'Hadley Nourse',tag,sp,rem},acts:['br_logs','br_sonar','_leave']};
    }},
    br_logs:{label:'Access ship logs',cost:'~2 min',run(G){
      G.learn('log_done');G.clue('ship_log','Ship Access Logs','Log shows Rowan accessed the airlock at 05:47 — 13 minutes before Petra\'s scheduled dive. Standard maintenance is logged at 06:15.','clue');
      return{narr:'<p>Access logs: <b>Rowan entered the airlock at 05:47.</b> Petra\'s scheduled dive was 06:00. Standard maintenance was logged for 06:15. He was there <b>early</b>. Out of sequence.',acts:['br_hadley','br_sonar','_leave']};
    }},
    br_sonar:{label:'Review sonar data',cost:'~1 min',run(G){
      G.clue('sonar_data','Sonar Discovery','Petra\'s last sonar sweep showed a massive thermal vent field — rich in rare earth deposits. The data was queued to transmit to the surface at 0700.','clue');G.learn('minerals_found');
      return{narr:'<p>Petra\'s last sonar sweep: a massive <b>thermal vent field</b> with rare earth mineral signatures. She\'d queued it to transmit to the surface at <b>0700</b>. Someone didn\'t want that sent.',acts:['br_hadley','br_logs','_leave']};
    }},
    lab_chen:{label:'Speak with Dr. Chen',cost:'~2 min',run(G){
      const tr=G.trust('chen');G.addTrust('chen');
      let sp='',tag='neutral',rem=G.loop>1&&tr>0;
      if(tr>=2){tag='friendly';sp=`"Petra told me last night — she was scared. Said Rowan had been asking too many questions about the dive schedule. Wanting to know exact times." He pauses. "She said if anything happened to her, check his toolbox."`;G.learn('chen_tip');G.clue('petra_scared','Petra Was Afraid',"Petra told Chen she was scared. Said Rowan was asking about dive times. 'Check his toolbox' if anything happened.",'suspect');}
      else sp=`"Petra was brilliant. Careful. This wasn't an accident." He won't say more.`;
      return{npc:{name:'Dr. Kai Chen',tag,sp,rem},acts:['lab_data','lab_sample','_leave']};
    }},
    lab_data:{label:"Examine Petra's data terminal",cost:'~1 min',run(G){
      G.clue('terminal','Encrypted Files','Petra had encrypted backups of her sonar data — and a separate file: personal notes about feeling watched. "RB keeps reviewing my dive schedule."','clue');G.learn('petra_notes');
      return{narr:'<p>Encrypted backups of sonar data. And a personal log: <b>"RB keeps reviewing my dive schedule. He asked again about air consumption rates. Something is wrong."</b> Written yesterday.',acts:['lab_chen','lab_sample','_leave']};
    }},
    lab_sample:{label:'Analyse a water sample',cost:'~2 min',run(G){
      G.clue('sample','Mineral Sample Analysis','The water samples confirm rare earth concentrations 40x higher than expected. Worth hundreds of billions over 20 years. Motive confirmed.','clue');G.learn('sample_done');
      return{narr:'<p>The numbers are staggering. <b>40x higher rare earth concentration</b> than expected. Worth hundreds of billions over 20 years. This discovery would have been Petra\'s legacy — and Meridian Corp\'s nightmare.',acts:['lab_chen','_leave']};
    }},
    eng_rowan:{label:'Speak with Rowan Beck',cost:'~2 min',run(G){
      const tr=G.trust('rowan');G.addTrust('rowan');
      let sp='',tag='neutral',rem=G.loop>1&&tr>0;
      if(G.knows('log_done')&&tr>=1){tag='suspicious';sp=`"The log?" He doesn't flinch. "I do early checks sometimes. Standard practice." He holds your eyes. "You have no idea what's at stake down here."`;G.addSusp('rowan',2);}
      else if(tr>=2){tag='suspicious';sp=`"You want the truth?" He laughs without humor. "Meridian Corp paid me. Significant money. They said 'delay the transmission.' I thought — I thought they meant technically. I didn't know she'd go down early."`;G.learn('rowan_paid');G.clue('rowan_confession',"Rowan's Admission","Meridian Corp paid Rowan to 'delay the transmission.' He claims he didn't know Petra would dive early.",'suspect');}
      else sp=`"I maintain the equipment. That's all. Petra's death was a tragedy." Flat. Rehearsed.`;
      return{npc:{name:'Rowan Beck',tag,sp,rem},acts:['eng_tools','eng_logs','_leave']};
    }},
    eng_tools:{label:"Search Rowan's toolbox",cost:'~1 min',run(G){
      G.learn('rowan_tools');G.clue('cutting_tool','Modified Cutting Tool','A line cutter — modified. The blade has been sharpened and fitted with a silencing grip. Not standard equipment. This was prepared.','suspect');
      return{narr:'<p>A line cutter — <b>modified</b>. Blade sharpened, fitted with a silencing grip. This is not standard equipment. Someone built this for a specific purpose.',acts:['eng_rowan','eng_logs','_leave']};
    }},
    eng_logs:{label:'Check maintenance records',cost:'~1 min',run(G){
      G.clue('maint_log','Maintenance Irregularity',"Rowan signed off Petra's equipment at 05:30 — but the dive equipment log shows it was checked at 04:50 by an unknown code.",'clue');G.learn('maint_done');
      return{narr:'<p>Rowan signed off on Petra\'s equipment at <b>05:30</b>. But the dive equipment terminal shows a check at <b>04:50</b> under an unregistered access code. He checked it twice — the second time is the one he logged.',acts:['eng_rowan','_leave']};
    }},
    qt_alinta:{label:'Speak with Alinta Walsh',cost:'~2 min',run(G){
      const tr=G.trust('alinta');G.addTrust('alinta');
      let sp='',tag='neutral',rem=G.loop>1&&tr>0;
      if(tr>=2){tag='friendly';sp=`"I was awake at 5am. Couldn't sleep. I heard someone in the airlock corridor — heavy boots. Rowan's the only one who wears those steel-caps." She looks down. "I should have said something."`;G.learn('alinta_witness');G.clue('alinta_heard',"Alinta's Testimony",'Alinta heard heavy boots in the airlock corridor at 5am. Only Rowan wears steel-cap boots on board.','clue');}
      else sp=`"I analyze data. I don't get involved in crew politics."`;
      return{npc:{name:'Alinta Walsh',tag,sp,rem},acts:['qt_search','qt_diary','_leave']};
    }},
    qt_search:{label:"Search Alinta's bunk area",cost:'~1 min',run(G){
      G.clue('alinta_printout','Data Printout','Alinta printed Petra\'s transmission schedule — showing the 0700 upload window. Multiple people knew exactly when the data would go up.','loop');
      return{narr:'<p>A printed copy of Petra\'s <b>transmission schedule</b> on Alinta\'s bunk. The 0700 window is circled. This was widely known — any of them could have known the timing.',acts:['qt_alinta','qt_diary','_leave']};
    }},
    qt_diary:{label:"Read Alinta's research diary",cost:'~1 min',run(G){
      G.clue('alinta_diary',"Alinta's Diary",'Diary entry from yesterday: "Rowan received a sat-phone call at midnight. Spent 40 minutes on it. Came back looking pale."','suspect');G.learn('rowan_call');
      return{narr:'<p>Diary entry, yesterday: <b>"Rowan on the sat-phone at midnight. 40 minutes. Came back pale. Wouldn\'t look at anyone at breakfast."</b> A call from Meridian Corp?',acts:['qt_alinta','_leave']};
    }},
    al_line:{label:"Examine Petra's cut air line",cost:'~1 min',run(G){
      G.clue('cut_line','Cut Air Line','Clean cut, not a fray. Made with a sharp, narrow blade — consistent with a modified line cutter. Done deliberately and carefully.','clue');G.learn('cut_examined');
      return{narr:'<p>A <b>clean cut</b>, not a fray. Made with a sharp, narrow blade. Deliberate. Careful. This wasn\'t an accident — someone knew exactly what they were cutting and where.',acts:['al_glove','al_scratches','_leave']};
    }},
    al_glove:{label:'Find the discarded glove',cost:'~30 sec',run(G){
      G.clue('glove','Discarded Glove','A single nitrile glove behind the equipment rack. Faint grease stain consistent with the modified tool. Size medium — Rowan\'s hands.','suspect');G.learn('glove_found');
      return{narr:'<p>Behind the equipment rack: a single <b>nitrile glove</b>. Faint grease stain — consistent with the modified cutter. Size medium. <b>Rowan\'s size.</b>',acts:['al_line','al_scratches','_leave']};
    }},
    al_scratches:{label:'Examine the door panel',cost:'~30 sec',run(G){
      G.clue('scratches','Forced Panel','The airlock inner panel shows fresh scratches around the locking mechanism — someone forced the manual override to prevent Petra from aborting the dive early.','suspect');G.learn('panel_done');
      return{narr:'<p>The inner lock panel: <b>fresh scratches</b> around the manual override. Someone locked Petra in. She couldn\'t abort once she was in the water.',acts:['al_line','al_glove','_leave']};
    }},
  },
  confidence(k){
    let s=0;
    if(k.has('log_done'))s+=15;if(k.has('rowan_tools'))s+=20;if(k.has('cut_examined'))s+=15;
    if(k.has('glove_found'))s+=15;if(k.has('rowan_confession'))s+=20;if(k.has('alinta_witness'))s+=15;
    return Math.min(s,100);
  },
  endingTier(k){
    if(k.has('rowan_confession')&&k.has('rowan_tools')&&k.has('alinta_witness')&&k.has('corp_motive'))return'perfect';
    if(k.has('rowan_tools')&&k.has('log_done')&&k.has('glove_found'))return'full';
    if(k.has('rowan_tools')&&k.has('log_done'))return'strong';
    if(k.has('log_done')||k.has('rowan_tools'))return'circumstantial';
    return'gut';
  },
  endings:{
    perfect:{sub:'★ FULL EXPOSURE',title:'The corporation falls.',color:'var(--accent2)',body:`<p>Rowan confessed during surface debrief — Meridian Corp had paid him £400,000 to delay the data transmission by any means. He'd intended to sabotage the equipment non-fatally. The modified cutter was meant to cause a minor leak, forcing an abort. He miscalculated the depth pressure.</p><p>Rowan received fifteen years. Meridian Corp faced international criminal charges. The mineral field was designated a protected scientific zone.</p><p>Petra's data was transmitted. Her discovery is named the Lenz Field.</p><p style="color:var(--accent2);font-style:italic">Three hundred meters down, justice surfaced.</p>`},
    full:{sub:'CASE CLOSED',title:'Rowan convicted.',color:'var(--accent)',body:`<p>The modified tool, access log, and glove formed an airtight physical evidence case. Rowan was convicted of manslaughter — he maintained he never intended to kill her.</p><p>Meridian Corp's involvement was suspected but never formally proven. Two executives resigned quietly.</p>`},
    strong:{sub:'PHYSICAL EVIDENCE',title:'Convicted on tools alone.',color:'var(--accent)',body:`<p>The modified cutter and the access logs were enough for a conviction. Rowan's lawyers argued equipment malfunction — the jury didn't believe them.</p><p>The corporate angle was explored briefly, then buried by Meridian's legal team.</p>`},
    circumstantial:{sub:'PARTIAL CASE',title:'Inconclusive.',color:'var(--accent3)',body:`<p>Rowan was detained and questioned but released pending further investigation. A civil maritime tribunal ruled Petra's death accidental. Rowan lost his certification.</p><p style="color:var(--danger)">Meridian Corp published a paper on the Lenz Field under their own name six months later.</p>`},
    gut:{sub:'NO EVIDENCE',title:'Ruled accidental.',color:'var(--danger)',body:`<p>Without physical evidence, your accusation was dismissed. Petra's death was officially recorded as equipment failure. Rowan continued working for Meridian Corp for three more years.</p><p style="color:var(--danger)">The Lenz Field is now a Meridian Corp mining operation.</p>`},
  }
},

// ─── STORY 4: SIGNAL LOST ─────────────────────────────────────
{
  id:'signal', title:'Signal Lost', setting:'Remote Radio Observatory, Iceland',
  desc:"An astronomer is found dead inside a locked signal booth. Three colleagues claim to have heard nothing. Someone is lying.",
  tags:['LOCKED ROOM','SCIENCE','ISOLATION'], difficulty:'med',
  victim:'Prof. Yuki Hamada', crime:'strangulation',
  intro:`<p>Professor Yuki Hamada — lead researcher at the Vatnajökull Radio Observatory — was found dead inside Signal Booth 3, locked from the inside. Strangulation. No signs of forced entry.</p><p>Three colleagues were on-site. One of them knows how it was done. You have ten minutes.</p>`,
  suspects:{
    brandt:{name:'Brandt',full:'Dr. Erik Brandt',init:'EB',role:'Senior astronomer',guilty:true},
    sol:{name:'Sol',full:'Sol Okafor',init:'SO',role:'PhD student',guilty:false},
    marta:{name:'Marta',full:'Marta Reyes',init:'MR',role:'Technician',guilty:false},
  },
  locations:{
    booth:{name:'Signal Booth 3',sub:'The Crime Scene',desc:'A locked room. The terminal inside was broadcasting when she was killed.',
      actions:['bt_lock','bt_terminal','bt_scratch']},
    control:{name:'Control Room',sub:'Main Observatory',desc:"The hub of the facility. Brandt's domain.",
      actions:['ct_brandt','ct_logs','ct_recording']},
    storage:{name:'Storage Block',sub:'Equipment Store',desc:'Sol is cataloguing equipment. He seems shaken.',
      actions:['sg_sol','sg_rope','sg_keycard']},
    canteen:{name:'Canteen',sub:'Staff Canteen',desc:"Marta is eating alone. She hasn't touched her food.",
      actions:['cn_marta','cn_rota','cn_phone']},
  },
  actions:{
    bt_lock:{label:'Examine the door lock',cost:'~1 min',run(G){
      G.clue('lock_mech','Lock Mechanism','The lock was engaged from outside using a thin metal probe inserted through the ventilation slot — leaving faint scratch marks. The room was NOT locked from inside.','clue');G.learn('lock_found');
      return{narr:'<p>The lock was engaged <b>from outside</b> — scratch marks in the vent slot, consistent with a thin probe. The room was staged to look self-locked. <b>This was not a suicide or accident.</b>',acts:['bt_terminal','bt_scratch','_leave']};
    }},
    bt_terminal:{label:'Examine the signal terminal',cost:'~1 min',run(G){
      G.clue('terminal2','Signal Terminal','The terminal was recording a signal at time of death. But the signal ID has been manually overwritten — only senior staff have that access level.','suspect');G.learn('terminal_found');
      return{narr:'<p>The signal was recording at time of death. But the <b>signal ID has been overwritten</b> — manually. Only senior staff have that permission. <b>Brandt or Yuki herself.</b>',acts:['bt_lock','bt_scratch','_leave']};
    }},
    bt_scratch:{label:'Find scratches near the air vent',cost:'~30 sec',run(G){
      G.clue('vent_scratch','Vent Scratches','Scratch marks around the external air vent. Consistent with something fed through — matches a probe tool kept in the instrument locker.','clue');G.learn('vent_found');
      return{narr:'<p>External vent: <b>fresh scratch marks</b>. Something was fed through from outside. Consistent with a probe tool from the instrument locker.',acts:['bt_lock','bt_terminal','_leave']};
    }},
    ct_brandt:{label:'Speak with Dr. Brandt',cost:'~2 min',run(G){
      const tr=G.trust('brandt');G.addTrust('brandt');
      let sp='',tag='neutral',rem=G.loop>1&&tr>0;
      if(tr>=2&&G.knows('terminal_found')){tag='suspicious';sp=`"You found the overwrite." He sits down slowly. "Yuki found evidence of signal fabrication. Years of it. My life's work — all fabricated. She was going to publish." He looks at his hands. "I went to talk to her."`;G.learn('brandt_confession');G.clue('brandt_conf',"Brandt's Admission","Yuki discovered Brandt had fabricated years of signal data. He 'went to talk to her' — in a locked booth.",'suspect');}
      else if(tr>=1)sp=`"I was in my office all evening. Check the badge log." He doesn't look up. "This is a tragedy."`;
      else sp=`"I have no comment until the police arrive properly. Please."`;
      return{npc:{name:'Dr. Erik Brandt',tag,sp,rem},acts:['ct_logs','ct_recording','_leave']};
    }},
    ct_logs:{label:'Access the access badge logs',cost:'~2 min',run(G){
      G.clue('badge_log','Badge Access Log','Brandt\'s badge accessed the corridor outside Booth 3 at 21:34. He told police he was in his office all evening.','clue');G.learn('badge_found');
      return{narr:'<p>Badge logs: <b>Brandt\'s card accessed the corridor outside Booth 3 at 21:34.</b> He told police he was in his office all evening. One of those is a lie.',acts:['ct_brandt','ct_recording','_leave']};
    }},
    ct_recording:{label:'Find the secret recording',cost:'~1 min',run(G){
      G.clue('audio_rec','Secret Audio','Yuki had activated a backup audio recorder inside Booth 3. Final four minutes: raised voices, then silence. Voice analysis matches Brandt.','suspect');G.learn('audio_found');
      return{narr:'<p>Yuki had activated a backup recorder. Final four minutes: <b>raised voices</b>. Then silence. Voice pattern analysis matches <b>Brandt</b>. She knew she might be in danger.',acts:['ct_brandt','ct_logs','_leave']};
    }},
    sg_sol:{label:'Speak with Sol Okafor',cost:'~2 min',run(G){

  endings:{

      return{narr:'<p>Two empty medical vials in the kitchen bin. One <b>sedative</b>. One <b>potassium chloride</b>. Both opened tonight. Someone brought them prepared.',acts:['kc_fritz','kc_print','_leave']};
